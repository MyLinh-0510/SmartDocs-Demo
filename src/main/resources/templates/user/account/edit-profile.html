<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chỉnh sửa thông tin cá nhân</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- SockJS + STOMP -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <link rel="stylesheet" th:href="@{/css/contact-message.css}">
  <link rel="stylesheet" th:href="@{/css/category.css}">
  <link rel="stylesheet" th:href="@{/css/notification.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>

<body>

<div class="fixed-header">
  <div th:insert="fragments/header :: header"></div>
</div>

<div class="edit-card">
  <h3 class="text-center mb-4">
    <i class="bi bi-pencil-square me-2"></i>Chỉnh sửa thông tin cá nhân
  </h3>

  <!-- Thông báo -->
  <div id="alertBox">
    <div th:if="${success}" class="alert alert-success text-center auto-hide" th:text="${success}"></div>
    <div th:if="${info}" class="alert alert-warning text-center auto-hide" th:text="${info}"></div>
    <div th:if="${error}" class="alert alert-danger text-center auto-hide" th:text="${error}"></div>
  </div>

  <!-- FORM -->
  <form th:action="@{/user/account/edit-profile}"
        th:object="${user}"
        method="post"
        enctype="multipart/form-data">

    <input type="hidden" th:field="*{id}"/>

    <!-- Avatar -->
    <div class="avatar-box">
      <div class="avatar-border">
        <img id="avatarPreview"
             th:src="${user.avatar != null ? '/uploads/avatars/' + user.avatar : '/images/avatar.jpg'}"
             class="profile-avatar">
      </div>
      <input type="file" name="avatarFile" class="form-control" accept="image/*" onchange="previewAvatar(this)">
    </div>

    <div class="mb-3">
      <label>Họ tên</label>
      <input type="text" th:field="*{name}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Số điện thoại</label>
      <input type="text" th:field="*{phone}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" th:field="*{email}" class="form-control" readonly>
      <small class="text-muted">Email không thể thay đổi</small>
    </div>

    <!-- PASSWORD GROUP -->
    <!-- CURRENT PASSWORD -->
    <div class="mb-3">
      <label>Mật khẩu hiện tại</label>
      <div class="input-wrapper">
        <input type="password"
               id="currentPassword"
               name="currentPassword"
               class="form-control"
               th:value="${currentPassword}"
               th:classappend="${errorCurrentPassword} ? ' is-invalid'">
        <span class="toggle-password" data-target="currentPassword">👁️</span>
      </div>
      <small class="text-danger" th:if="${errorCurrentPassword}" th:text="${errorCurrentPassword}"></small>
    </div>

    <!-- NEW PASSWORD -->
    <div class="mb-3">
      <label>Mật khẩu mới</label>
      <div class="input-wrapper">
        <input type="password"
               id="newPassword"
               name="newPassword"
               class="form-control"
               th:value="${newPassword}"
               th:classappend="${errorNewPassword} ? ' is-invalid'">
        <span class="toggle-password" data-target="newPassword">👁️</span>
      </div>
      <small class="text-danger" th:if="${errorNewPassword}" th:text="${errorNewPassword}"></small>
    </div>

    <!-- CONFIRM -->
    <div class="mb-3">
      <label>Xác nhận mật khẩu</label>
      <div class="input-wrapper">
        <input type="password"
               id="confirmPassword"
               name="confirmPassword"
               class="form-control"
               th:value="${confirmPassword}"
               th:classappend="${errorConfirmPassword} ? ' is-invalid'">
        <span class="toggle-password" data-target="confirmPassword">👁️</span>
      </div>
      <small class="text-danger" th:if="${errorConfirmPassword}" th:text="${errorConfirmPassword}"></small>
    </div>

    <div class="mb-4">
      <label>Chức vụ</label>
      <select th:field="*{role}" class="form-select" disabled>
        <option th:value="EMPLOYEE">Nhân viên</option>
        <option th:value="CEO">Giám đốc điều hành</option>
      </select>
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-save">
        <i class="bi bi-check-circle me-1"></i> Lưu thay đổi
      </button>
      <a th:href="@{/user/account/profile-user}" class="btn btn-secondary ms-2">Quay lại</a>
    </div>

  </form>
</div>

<div th:replace="~{fragments/contact-message :: contact-message}"></div>
<!-- Chat script -->
<script th:src="@{/js/contact-message.js}"></script>

<!-- FOOTER -->
<div th:insert="~{fragments/footer :: footer}"></div>

<!-- NOTI -->
<div th:replace="~{fragments/notifyModal :: notifyModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/notification.js}"></script>

<script>
  // Avatar preview
  function previewAvatar(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => document.getElementById("avatarPreview").src = e.target.result;
      reader.readAsDataURL(input.files[0]);
    }
  }

  // Toggle password
  document.querySelectorAll(".toggle-password").forEach(icon => {
    icon.addEventListener("click", () => {
      const target = document.getElementById(icon.dataset.target);
      if (target.type === "password") {
        target.type = "text";
        icon.textContent = "🙈";
      } else {
        target.type = "password";
        icon.textContent = "👁️";
      }
    });
  });

  // Auto scroll to error field
  document.addEventListener("DOMContentLoaded", () => {
    const fields = ["currentPassword", "newPassword", "confirmPassword"];
    for (let id of fields) {
      const el = document.getElementById(id);
      if (el && el.classList.contains("is-invalid")) {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => el.focus(), 300);
        break;
      }
    }
  });

  // Auto hide alerts
  setTimeout(() => {
    document.querySelectorAll('.auto-hide').forEach(el => {
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 500);
    });
  }, 5000);
</script>

</body>
</html>
