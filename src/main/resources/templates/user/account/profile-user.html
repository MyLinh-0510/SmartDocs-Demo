<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông tin cá nhân</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- SockJS + STOMP -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <link rel="stylesheet" th:href="@{/css/contact-message.css}">
  <link rel="stylesheet" th:href="@{/css/category.css}">
  <link rel="stylesheet" th:href="@{/css/notification.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/profile.css}">
  <link rel="stylesheet" th:href="@{/css/ai-chatbox.css}">

  <style>

  </style>
</head>

<body>

<!-- Navbar -->
<div class="fixed-header">
  <div th:insert="fragments/header :: header"></div>
</div>

<!-- Nội dung chính -->
<div class="profile-card text-center">

  <!-- Hiển thị thành công -->
  <div th:if="${success}" class="alert alert-success text-md-start" th:text="${success}"></div>

  <!-- Ảnh đại diện mặc định -->

  <img th:src="${user.avatar != null
    ? '/uploads/avatars/' + user.avatar
    : '/images/avatar.jpg'}"
       class="profile-avatar"
       alt="Avatar">



  <!-- Thông tin chi tiết -->
  <div class="text-start mt-4">
    <p class="info-item">
      <strong>Họ tên:</strong>
      <span th:text="${user.name}"></span>
    </p>

    <p class="info-item">
      <strong>Số điện thoại:</strong>
      <span th:text="${user.phone != null ? user.phone : 'Chưa cập nhật'}"></span>
    </p>

    <p class="info-item">
      <strong>Email:</strong>
      <span th:text="${user.email}">example@email.com</span>
    </p>


  </div>

  <div class="mt-4 d-flex justify-content-center gap-3">
    <a th:href="@{/user/account/edit-profile}" class="btn btn-edit">
      <i class="bi bi-pencil-square me-2"></i> Chỉnh sửa thông tin
    </a>
    <a th:href="@{/user/home}" class="btn btn-back">
      <i class="bi bi-arrow-left me-2"></i> Quay lại
    </a>
  </div>

</div>

<!-- Ví dụ: HomePage -->
<div th:replace="~{fragments/ai-chatbox :: ai-chatbox}"></div>

<div th:replace="~{fragments/contact-message :: contact-message}"></div>
<!-- Chat script -->
<script th:src="@{/js/contact-message.js}"></script>

<!-- FOOTER -->
<div th:insert="~{fragments/footer :: footer}"></div>

<!-- NOTI -->
<div th:replace="~{fragments/notifyModal :: notifyModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  setTimeout(function () {
    let alertBox = document.querySelector(".alert-success");
    if (alertBox) {
      alertBox.style.transition = "opacity 0.5s";
      alertBox.style.opacity = "0";
      setTimeout(() => alertBox.remove(), 500);
    }
  }, 4000);
</script>

<!-- Thông báo -->
<script th:src="@{/js/notification.js}"></script>


</body>
</html>
