<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lịch sử liên hệ</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/contact.css}">
  <link rel="stylesheet" th:href="@{/css/history.css}">

  <style>
    .chat-popup {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 350px;
      height: 500px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.25);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 99999;
    }
    .chat-header-popup { background: #0d6efd; color: white; padding: 12px; display: flex; justify-content: space-between; }
    .chat-body-popup { flex: 1; padding: 12px; overflow-y: auto; background: #f5f5f5; }
    .chat-input-popup { padding: 10px; display: flex; border-top: 1px solid #ddd; background: white; }
    .chat-input-popup input { flex: 1; border-radius: 18px; padding: 8px; border: 1px solid #ccc; }
    .chat-input-popup button { margin-left: 8px; padding: 8px 16px; border: none; border-radius: 18px; background: #0d6efd; color: white; }
    .message-row { display: flex; margin-bottom: 10px; }
    .message-user { justify-content: flex-end; }
    .message-admin { justify-content: flex-start; }
    .user-bubble { background: #0d6efd; color: white; padding: 10px 14px; border-radius: 16px; border-bottom-right-radius: 0; }
    .admin-bubble { background: #e4e6eb; padding: 10px 14px; border-radius: 16px; border-bottom-left-radius: 0; }
  </style>
</head>

<body>
<div th:insert="fragments/header :: header"></div>

<div class="container">

  <h3 class="mt-3">📬 Lịch sử liên hệ</h3>

  <table class="table table-bordered table-hover">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nội dung</th>
      <th>Thời gian</th>
      <th>Trạng thái</th>
      <th>Phản hồi Admin</th>
      <th>Hành động</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${history}">
      <td th:text="${c.id}"></td>
      <td th:text="${c.message}"></td>
      <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

      <td>
        <span th:if="${c.adminReply != null}" class="badge bg-success">Đã trả lời</span>
        <span th:if="${c.adminReply == null}" class="badge bg-secondary">Chưa trả lời</span>
      </td>

      <td>
        <span th:if="${c.adminReply != null}">
          <button class="btn btn-sm btn-success"
                  th:attr="data-reply=${c.adminReply}"
                  onclick="showReply(this)">Xem</button>
        </span>
        <span th:if="${c.adminReply == null}">—</span>
      </td>

      <td>
        <a href="javascript:void(0)"
           th:attr="onclick=|openChatPopup(${c.id})|"
           class="btn btn-sm btn-primary">
          💬 Chat
        </a>
      </td>
    </tr>
    </tbody>
  </table>

</div>

<div th:insert="~{fragments/footer :: footer}"></div>


<!-- CHAT POPUP -->
<div id="chatPopup" class="chat-popup">

  <div class="chat-header-popup">
    <span>Trao đổi với Admin</span>
    <button class="btn-close" onclick="closeChatPopup()"></button>
  </div>

  <div id="chatPopupBody" class="chat-body-popup">
    <div id="chatMessages"></div>
  </div>

  <div class="chat-input-popup">
    <input id="chatInput" type="text" placeholder="Nhập tin nhắn...">
    <button id="chatSendBtn">Gửi</button>
  </div>

</div>
<script>
  function showReply(btn) {
    const reply = btn.getAttribute("data-reply");

    const modal = document.createElement("div");
    modal.classList.add("modal", "fade");
    modal.id = "replyModal";
    modal.innerHTML = `
      <div class="modal-dialog">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title">Phản hồi của Admin</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <p>${reply}</p>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
          </div>

        </div>
      </div>
    `;

    document.body.appendChild(modal);

    const bsModal = new bootstrap.Modal(modal);
    bsModal.show();

    modal.addEventListener('hidden.bs.modal', () => modal.remove());
  }
</script>


<script>
  // mở popup
  function openChatPopup(contactId) {
    window.currentContactId = contactId;

    document.getElementById("chatPopup").style.display = "flex"; // <– FIX

    const box = document.getElementById("chatMessages");
    box.innerHTML = `<div class="text-center text-muted">Đang tải...</div>`;

    fetch('/user/contactu/messages/' + contactId)
            .then(res => res.json())
            .then(messages => {
              box.innerHTML = "";
              messages.forEach(m => {
                box.innerHTML += `
                    <div class="message-row ${m.fromAdmin ? 'message-admin' : 'message-user'}">
                        <div class="bubble ${m.fromAdmin ? 'admin-bubble' : 'user-bubble'}">
                            ${m.content}
                            <div class="small text-muted mt-1">${m.createdAt.replace('T',' ')}</div>
                        </div>
                    </div>
                `;
              });

              box.scrollTop = box.scrollHeight;
            });
  }


  function closeChatPopup() {
    document.getElementById("chatPopup").style.display = "none";
  }


  document.getElementById("chatSendBtn").onclick = sendMessagePopup;

  function sendMessagePopup() {
    const content = document.getElementById("chatInput").value.trim();
    if (!content) return;

    // append UI
    const box = document.getElementById("chatMessages");
    box.innerHTML += `
      <div class="message-row message-user">
        <div class="user-bubble">${content}</div>
      </div>
    `;

    document.getElementById("chatInput").value = "";

    fetch("/user/contactu/message/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contactId: window.currentContactId,
        content: content,
        admin: false
      })
    });
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
