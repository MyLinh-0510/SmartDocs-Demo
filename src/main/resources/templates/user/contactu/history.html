<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lịch sử liên hệ</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- SockJS + STOMP -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <link rel="stylesheet" th:href="@{/css/category.css}">
  <link rel="stylesheet" th:href="@{/css/notification.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/contact.css}">
  <link rel="stylesheet" th:href="@{/css/history.css}">
  <link rel="stylesheet" th:href="@{/css/contact-message.css}">
  <link rel="stylesheet" th:href="@{/css/ai-chatbox.css}">

  <!-- CSRF META TAG CHO JS USER -->
  <meta name="_csrf" th:content="${_csrf?.token}"/>
  <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>

</head>

<body>
<div th:insert="fragments/header :: header"></div>

<div class="container">

  <h3 class="history-title">Lịch sử liên hệ</h3>

  <table class="table table-bordered table-hover">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nội dung</th>
      <th>Thời gian</th>
      <th>Trạng thái</th>
      <th>Phản hồi Admin</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${history}">
      <td th:text="${c.id}"></td>
      <td>
        <div class="history-message"
             th:text="${c.message}"
             th:title="${c.message}">
        </div>
      </td>
      <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
      <td>
        <span th:if="${c.adminReply != null}" class="badge bg-success">Đã trả lời</span>
        <span th:if="${c.adminReply == null}" class="badge bg-secondary">Chưa trả lời</span>
      </td>

      <td>
        <span th:if="${c.adminReply != null}">
          <button class="btn btn-sm btn-success"
                  th:data-reply="${c.adminReply}"
                  onclick="showReply(this)">Xem</button>
        </span>
        <span th:if="${c.adminReply == null}">—</span>
      </td>
    </tr>
    </tbody>
  </table>

</div>

<script>
  function showReply(btn) {
    const reply = btn.dataset.reply;

    const modal = document.createElement("div");
    modal.className = "modal fade";
    modal.innerHTML = `
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Phản hồi của Admin</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p>${reply.replace(/\n/g, '<br>')}</p>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
          </div>
        </div>
      </div>
    `;

    document.body.appendChild(modal);
    const bsModal = new bootstrap.Modal(modal, {
      backdrop: true,
      keyboard: true
    });
    bsModal.show();

    modal.addEventListener('hidden.bs.modal', () => modal.remove());
  }
</script>

<!-- Ví dụ: HomePage -->
<div th:replace="~{fragments/ai-chatbox :: ai-chatbox}"></div>

<div th:replace="~{fragments/contact-message :: contact-message}"></div>
<!-- Chat script -->
<script th:src="@{/js/contact-message.js}"></script>

<!-- FOOTER -->
<div th:insert="~{fragments/footer :: footer}"></div>

<!-- NOTI -->
<div th:replace="~{fragments/notifyModal :: notifyModal}"></div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Thông báo -->
<script th:src="@{/js/notification.js}"></script>

</body>
</html>
