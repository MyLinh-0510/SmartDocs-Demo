<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử phản hồi của bạn</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/category.css}">
    <link rel="stylesheet" th:href="@{/css/notification.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/contact.css}">
</head>

<body>
<div th:insert="fragments/header :: header"></div>

<!-- HERO -->
<div class="contact-hero">
    <h1>Lịch sử phản hồi</h1>
    <p>Danh sách các liên hệ bạn đã gửi cho SmartDocs</p>
</div>

<section class="py-5">
    <div class="container">

        <!-- Nếu không có tin nhắn -->
        <div th:if="${#lists.isEmpty(messages)}" class="text-center">
            <h4 class="text-muted">Bạn chưa gửi liên hệ nào.</h4>
            <a href="/site/contact/form" class="btn btn-primary mt-3">
                <i class="bi bi-arrow-left"></i> Quay lại trang liên hệ
            </a>
        </div>

        <!-- DANH SÁCH TIN NHẮN -->
        <div th:if="${!#lists.isEmpty(messages)}">

            <div class="mb-4">
                <a href="/site/contact/form" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Gửi liên hệ mới
                </a>
            </div>

            <div class="row">
                <div class="col-md-12">

                    <div th:each="msg : ${messages}" class="card shadow-sm mb-4">
                        <div class="card-body">

                            <h5 class="fw-bold text-primary">
                                <i class="bi bi-chat-left-dots"></i>
                                Phản hồi từ liên hệ của bạn
                            </h5>

                            <p class="mt-2">
                                <strong>Nội dung bạn gửi:</strong>
                                <br>
                                <span th:text="${msg.message}"></span>
                            </p>

                            <hr>

                            <!-- Nếu admin đã trả lời -->
                            <div th:if="${msg.replied}">
                                <p class="text-success fw-bold">
                                    <i class="bi bi-check-circle-fill"></i>
                                    Admin đã phản hồi:
                                </p>

                                <p th:text="${msg.adminReply}"></p>

                                <small class="text-muted">
                                    <i class="bi bi-clock"></i>
                                    <span th:text="${#temporals.format(msg.replyDate, 'dd/MM/yyyy HH:mm')}"></span>
                                </small>
                            </div>

                            <!-- Nếu chưa trả lời -->
                            <div th:if="${!msg.replied}">
                                <p class="text-muted fst-italic">
                                    <i class="bi bi-hourglass-split"></i>
                                    Admin chưa phản hồi.
                                </p>
                            </div>

                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>
</section>


<!-- FOOTER -->
<div th:insert="~{fragments/footer :: footer}"></div>

<!-- NOTI -->
<div th:replace="~{fragments/notifyModal :: notifyModal}"></div>

</body>
</html>
