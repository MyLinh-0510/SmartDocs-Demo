<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Yêu cầu quyền truy cập</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

<h3>📄 <span th:text="${document.title}"></span></h3>

<p>Tài liệu này chỉ chia sẻ cho:</p>
<p class="text-primary fw-bold" th:text="${allowedEmail}"></p>

<hr>

<h5>Yêu cầu quyền truy cập?</h5>
<p>Chúng tôi sẽ gửi yêu cầu đến <b th:text="${ownerEmail}"></b>.</p>

<form method="post" action="/share/request/{{ token }}">
    <input name="email" type="email" placeholder="Nhập email của bạn" required>
    <button type="submit">Gửi yêu cầu</button>
</form>

</body>
</html>
