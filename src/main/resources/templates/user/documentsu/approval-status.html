<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trạng thái duyệt</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-4">
    <h3>📑 Trạng thái văn bản</h3>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>Tiêu đề</th>
            <th>Người trình</th>
            <th>Trạng thái</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="doc : ${documents}">
            <td th:text="${doc.title}"></td>
            <td th:text="${doc.createdBy.name}"></td>
            <td>
                <span class="badge bg-warning"
                      th:if="${doc.status.name() == 'PENDING_APPROVAL'}">
                    Chờ duyệt
                </span>
                <span class="badge bg-success"
                      th:if="${doc.status.name() == 'APPROVED'}">
                    Đã duyệt
                </span>
                <span class="badge bg-danger"
                      th:if="${doc.status.name() == 'REJECTED'}">
                    Từ chối
                </span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
