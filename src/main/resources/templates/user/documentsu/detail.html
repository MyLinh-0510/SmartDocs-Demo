<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title th:text="${document.title}">Chi tiết văn bản</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
<div th:insert="fragments/header :: header"></div>

<div class="container py-4">
  <a th:href="@{/user/home}" class="btn btn-outline-secondary mb-3">⬅ Quay lại</a>

  <h2 th:text="${document.title}">Tiêu đề văn bản</h2>
  <p class="text-muted">Ngày ban hành:
    <span th:text="${#dates.format(document.createdAt, 'dd/MM/yyyy')}"></span>
  </p>
  <p><strong>Loại văn bản:</strong> <span th:text="${document.category}"></span></p>
  <hr>

  <!-- Nội dung văn bản -->
  <div class="mt-3" th:utext="${document.contentHtml}">
    <!-- Nội dung văn bản được hiển thị ở đây -->
  </div>

  <div class="mt-4 text-end">
    <button class="btn btn-primary">⬇ Tải xuống</button>
  </div>
</div>

<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
