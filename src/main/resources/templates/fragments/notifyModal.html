<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modal Notify</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* BACKDROP blur */
        .modal-backdrop.show {
            backdrop-filter: blur(6px);
        }

        /* MODAL CONTENT */
        #notifyModal .modal-content {
            border-radius: 18px;
            background: linear-gradient(135deg, #1e1e2f, #2c3e50);
            color: #fff;
            border: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            animation: scaleIn 0.25s ease forwards;
        }

        #notifyModal .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 14px 18px;
        }

        #notifyModal .modal-title {
            font-weight: 600;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* BODY */
        #notifyModal .modal-body {
            font-size: 15px;
            line-height: 1.6;
            padding: 20px;
        }

        /* LINK BUTTON */
        #notifyModal .btn-primary {
            border-radius: 10px;
            padding: 8px 18px;
            font-weight: 500;
            background: linear-gradient(135deg, #3498db, #6dd5fa);
            border: none;
            transition: all 0.2s ease;
        }

        #notifyModal .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52,152,219,0.4);
        }

        /* wrapper */
        .notify-detail-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* message */
        .notify-message {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.6;
        }

        /* link */
        .notify-message a {
            color: #6dd5fa;
            font-weight: 600;
            text-decoration: none;
        }

        .notify-message a:hover {
            text-decoration: underline;
            color: #00c6ff;
        }

        /* meta container */
        .notify-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-top: 10px;
            flex-wrap: nowrap;
            gap: 10px;
            min-width: 0; /* cho phép flex con co giãn */
        }

        .notify-time {
            color: #ccc;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1;
        }

        .notify-status {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }

        /* unread */
        .notify-status.unread {
            background: rgba(231, 76, 60, 0.2);
            color: #ff7675;
        }

        /* read */
        .notify-status.read {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

    </style>
</head>

<body>
<div th:fragment="notifyModal">
    <div class="modal fade" id="notifyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">
                        🔔 Chi tiết thông báo
                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="notifyDetail">
                    <!-- content sẽ inject từ JS -->
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
