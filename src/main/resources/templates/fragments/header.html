<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SmartDocs Header</title>

    <!-- Bootstrap 5 CSS + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/contact-message.css}">
    <link rel="stylesheet" th:href="@{/css/notification.css}">

    <style>
        .navbar-custom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            background-color: #2c3e50;
        }
        body { padding-top: 72px; }
    </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<nav class="navbar navbar-expand-lg navbar-custom" th:fragment="header">
    <div class="container-fluid">

        <!-- LOGO -->
        <a class="navbar-brand text-white fw-bold" th:href="@{/user/home-page}">
            <i class="bi bi-journal-text me-2"></i>SmartDocs
        </a>

        <!-- NÚT 3 GẠCH -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-center">

                <!-- Trang chủ -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/home-page}">
                        <i class="bi bi-house"></i> Trang chủ
                    </a>
                </li>

                <!-- Tài liệu -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="bi bi-file-earmark-text"></i> Tài liệu
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end doc-dropdown doc-scroll-10">

                        <li>
                            <a class="dropdown-item" th:href="@{/user/documentsu/document-page}">
                                📂 Tài liệu của tôi
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <th:block th:each="category : ${allCategories}">
                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/user/documentsu/document-page(categoryId=${category.id})}"
                                   th:text="${category.name}">
                                </a>
                            </li>
                        </th:block>

                    </ul>
                </li>

                <!-- Liên hệ -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/contactu}">
                        <i class="bi bi-envelope"></i> Liên hệ
                    </a>
                </li>

                <!-- CHAT -->
                <li class="nav-item">
                    <a class="nav-link position-relative"
                       href="javascript:void(0);"
                       onclick="toggleChatSidebar()">
                        <i class="bi bi-chat-dots fs-5 text-white"></i>

                        <!-- badge (tuỳ bạn dùng sau) -->
                        <span id="chatBadge"
                              class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill"
                              style="font-size:10px; display:none;">0</span>
                    </a>
                </li>

                <!-- Notify -->
                <li class="nav-item dropdown notify-wrapper">
                    <a class="nav-link position-relative dropdown-toggle"
                       data-bs-toggle="dropdown">
                        <i class="bi bi-bell fs-5 text-white"></i>
                        <span id="notifyBadge" class="badge bg-danger notify-badge">22</span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end notify-dropdown"
                        data-bs-auto-close="outside">

                        <li class="notify-header">
                            <div class="notify-title">Thông báo</div>

                            <div class="notify-tabs">
                                <button class="notify-tab active" data-filter="all">
                                    Tất cả
                                </button>
                                <button class="notify-tab" data-filter="unread">
                                    Chưa đọc
                                </button>
                            </div>
                        </li>

                        <li>
                            <div id="notifyList" class="notify-list"></div>
                        </li>
                    </ul>
                </li>

                <!-- USER -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center"
                       data-bs-toggle="dropdown">
                        <span th:text="${#authentication.principal.fullName}"></span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" th:href="@{/user/account/profile-user}">
                                👤 Thông tin cá nhân
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/user/contactu/history}">
                                🕒 Lịch sử liên hệ
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li sec:authorize="hasRole('CEO')">
                            <a class="dropdown-item text-warning fw-bold"
                               th:href="@{/user/documentsu/my-documents}">
                                ✍️ Văn bản cần duyệt
                            </a>
                        </li>
                        <li sec:authorize="hasRole('EMPLOYEE')">
                            <a class="dropdown-item"
                               th:href="@{/user/documentsu/my-documents}">
                                📑 Trình ký văn bản
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/admin/account/logout}" method="post">
                                <button class="dropdown-item text-danger">
                                    🚪 Đăng xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>

            </ul>
        </div>
    </div>
</nav>
</body>
</html>
