<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Lịch sử liên hệ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/contact.css}">
  <link rel="stylesheet" th:href="@{/css/history.css}">

</head>

<body>

<div th:insert="fragments/header :: header"></div>

<div class="container container-history">

  <h3 class="history-title">📬 Lịch sử liên hệ</h3>

  <table class="table table-hover table-bordered table-custom">
    <thead>
    <tr>
      <th>Nội dung</th>
      <th>Thời gian</th>
      <th>Trạng thái</th>
      <th>Phản hồi từ Admin</th>
      <th>Chi tiết</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${history}">
      <td th:text="${c.message}"></td>
      <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

      <td>
        <span th:if="${c.adminReply != null}" class="badge bg-success">Đã trả lời</span>
        <span th:if="${c.adminReply == null}" class="badge bg-secondary">Chưa trả lời</span>
      </td>

      <td>
        <span th:if="${c.adminReply != null}" th:text="${c.adminReply}"></span>
        <span th:if="${c.adminReply == null}">—</span>
      </td>

      <td>
        <a th:href="@{'/site/contact/detail/' + ${c.id}}" class="btn btn-detail btn-sm">
          Xem
        </a>
      </td>
    </tr>
    </tbody>
  </table>


</div>

<div th:insert="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
