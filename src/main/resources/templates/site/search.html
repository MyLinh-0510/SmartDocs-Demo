<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kết quả tìm kiếm - SmartDocs</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
<div th:insert="fragments/header :: header"></div>

<div class="container py-4">
  <h3 class="mb-3">Kết quả tìm kiếm cho: "<span th:text="${keyword}"></span>"</h3>

  <div th:if="${#lists.isEmpty(results)}" class="alert alert-warning">
    Không tìm thấy kết quả nào phù hợp.
  </div>

  <div class="list-group" th:each="doc : ${results}">
    <a th:href="@{/site/detail/{id}(id=${doc.id})}" class="list-group-item list-group-item-action">
      <div class="d-flex w-100 justify-content-between">
        <h5 th:text="${doc.title}">Tên văn bản</h5>
        <small th:text="${#dates.format(doc.createdAt, 'dd/MM/yyyy')}"></small>
      </div>
      <p class="mb-1 text-muted" th:text="${doc.summary}">Mô tả ngắn...</p>
      <small th:text="'Loại: ' + ${doc.category}"></small>
    </a>
  </div>
</div>

<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
