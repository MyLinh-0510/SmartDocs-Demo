<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - SmartDocs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link th:href="@{/css/dashboard.css}" rel="stylesheet">
  <link th:href="@{/css/table_button.css}" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #f1f5f9;
      margin: 0;
      padding: 0;
      color: #1e293b;
    }

    #wrapper {
      display: flex;
    }

    .main-content {
      flex: 1;
      padding: 30px;
    }

    .dashboard-header {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .stat-number {
      font-size: 28px;
      font-weight: bold;
      color: #1e40af;
    }

    /* ===================== FIX CHIỀU CAO BIỂU ĐỒ ===================== */
    .chart-card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);

      height: 360px !important;          /* cố định chiều cao khung biểu đồ */
      display: flex;
      flex-direction: column;
      margin-bottom: 40px;
    }

    .chart-card canvas {
      flex: 1;
      height: 100% !important;           /* canvas luôn vừa khung */
      max-height: 100% !important;
    }
    /* ================================================================= */
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- 🔹 NAVBAR -->
<div th:insert="~{fragments/navbar :: navbar}"></div>

<div id="wrapper">

  <!-- 🔹 SIDEBAR -->
  <div th:insert="~{fragments/sidebar :: sidebar}"></div>

  <!-- 🔹 MAIN CONTENT -->
  <main class="main-content">

    <h2 class="dashboard-header">Bảng điều khiển</h2>

    <!-- ============ THỐNG KÊ ============ -->
    <div class="stats-grid">

      <div class="stat-card">
        <div>Tổng người dùng</div>
        <div class="stat-number" th:text="${stats.totalUsers}">0</div>
      </div>

      <div class="stat-card">
        <div>Tổng tài liệu</div>
        <div class="stat-number" th:text="${stats.totalDocuments}">0</div>
      </div>

      <div class="stat-card">
        <div>Tổng danh mục</div>
        <div class="stat-number" th:text="${stats.totalCategories}">0</div>
      </div>

      <div class="stat-card">
        <div>Phản hồi người dùng</div>
        <div class="stat-number" th:text="${stats.totalFeedbacks}">0</div>
      </div>

      <div class="stat-card">
        <div>Đơn hàng</div>
        <div class="stat-number" th:text="${stats.totalOrders}">0</div>
      </div>

    </div>

    <!-- ============ BIỂU ĐỒ ============ -->
    <div class="charts-grid">

      <!-- BIỂU ĐỒ NGƯỜI DÙNG -->
      <div class="chart-card">
        <h3>Người dùng đăng ký theo tháng</h3>
        <canvas id="usersChart"></canvas>
      </div>

      <!-- TOP 5 SẢN PHẨM -->
      <div class="chart-card">
        <h3>Top tài liệu tải nhiều</h3>
        <canvas id="topDownloadsChart"></canvas>
      </div>

    </div>

  </main>

</div>

<!-- ============ SCRIPT ============ -->
<script th:inline="javascript">
  /*<![CDATA[*/

  const chartData = JSON.parse(/*[[${chartDataJson}]]*/ '{}');
  const bestSellingProducts = JSON.parse(/*[[${bestSellingProductsJson}]]*/ '[]');

  Chart.defaults.font.family = 'Segoe UI';
  Chart.defaults.color = '#334155';

  // USERS CHART
  new Chart(document.getElementById("usersChart"), {
    type: "bar",
    data: {
      labels: chartData.labels,
      datasets: [{
        label: "Người dùng đăng ký",
        data: chartData.newUsers,
        backgroundColor: "#f1ee08",
        borderColor: "#f4d406",
        borderWidth: 1,
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      }
    }
  });

  // TOP DOWNLOADS CHART
  new Chart(document.getElementById("topDownloadsChart"), {
    type: "bar",
    data: {
      labels: bestSellingProducts.map(p => p.name),
      datasets: [{
        label: "Lượt tải",
        data: bestSellingProducts.map(p => p.sales),
        backgroundColor: "#f1ee08",
        borderRadius: 8,
        borderSkipped: false
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      }
    }
  });

  /*]]>*/
</script>

</body>
</html>
