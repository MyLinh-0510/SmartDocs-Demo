<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thông tin cá nhân</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link th:href="@{/css/dashboard.css}" rel="stylesheet">
  <link th:href="@{/css/table_button.css}" rel="stylesheet">

  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; }
    #wrapper { display: flex; min-height: 100vh; }
    .main-content { flex: 1; padding: 40px 20px; background-color: #fff; }

    .page-title { text-align: center; margin-bottom: 30px; font-size: 1.9rem; color: #2c3e50; font-weight: 600; }

    .alert-success, .alert-danger {
      max-width: 600px;
      margin: 0 auto 30px auto;
      border-radius: 8px;
      padding: 12px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .profile-card {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 40px 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }

    .profile-card p {
      font-size: 17px;
      margin-bottom: 22px;
      color: #2c3e50;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .profile-card strong {
      color: #495057;
      min-width: 100px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Ô hiển thị mật khẩu + icon mắt */
    .password-wrapper {
      position: relative;
      flex: 1;
      max-width: 360px;
    }

    .password-wrapper input {
      width: 100%;
      padding: 10px 48px 10px 14px !important;
      border: 1px solid #ced4da;
      border-radius: 8px;
      background-color: #f8f9fa;
      font-size: 16px;
      height: 48px;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      font-size: 20px;
      cursor: pointer;
      user-select: none;
      color: #6c757d;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #0d6efd;
    }

    .button-group {
      text-align: center;
      margin-top: 40px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-action {
      min-width: 200px;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 50px;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div th:insert="~{fragments/navbar :: navbar}"></div>

<div id="wrapper">
  <div th:insert="~{fragments/sidebar :: sidebar}"></div>

  <div class="main-content">
    <h2 class="page-title">Thông tin cá nhân</h2>

    <!-- Success message -->
    <div class="alert alert-success" th:if="${success != null and !#strings.isEmpty(success)}" role="alert">
      <span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Error message -->
    <div class="alert alert-danger" th:if="${error != null and !#strings.isEmpty(error)}" role="alert">
      <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="profile-card">
      <p><strong>Họ tên:</strong> <span th:text="${user.name}">Admin</span></p>
      <p><strong>Email:</strong> <span th:text="${user.email}">admin@gmail.com</span></p>

      <div class="button-group">
        <a th:href="@{/admin/dashboard}" class="btn btn-danger btn-action text-white">
          ⬅ Quay lại trang Dashboard
        </a>
        <a th:href="@{/admin/account/profile-edit}" class="btn btn-info btn-action text-white">
          Chỉnh sửa thông tin
        </a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
