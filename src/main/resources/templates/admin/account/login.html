<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Khung tổng 2 phần: ảnh + form */
        .container {
            background: white;
            display: flex;
            width: 900px;
            max-width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Ảnh bên trái */
        .image-box {
            width: 45%;
            background-color: #e8f5e9;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Form bên phải */
        .login-container {
            width: 55%;
            padding: 35px 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 10px 38px 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            height: 42px;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: #28a745;
        }

        .remember-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .remember-group input {
            margin-right: 8px;
        }

        button {
            width: 100%;
            background-color: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            font-weight: 500;
        }

        .alert-error {
            background-color: #ffdddd;
            color: #d8000c;
            border-left: 4px solid red;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .form-footer {
            text-align: center;
            margin-top: 12px;
        }

        .form-footer a {
            color: #007bff;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive - Ẩn ảnh khi màn nhỏ */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .image-box {
                display: none;
            }
            .login-container {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Ảnh bên trái -->
    <div class="image-box">
        <img src="/images/login.jpg" alt="Login Image">
    </div>

    <!-- FORM LOGIN -->
    <div class="login-container">
        <h1>Đăng nhập</h1>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div th:if="${param.locked}" class="alert alert-error">
            🚫 Tài khoản của bạn đã bị khóa. Vui lòng liên hệ quản trị viên.
        </div>


        <form th:action="@{/admin/account/login}" method="post">

            <div class="form-group">
                <label for="username">Email:</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required>
                    <span class="toggle-password" id="togglePassword">👁️</span>
                </div>
            </div>

            <button type="submit">Đăng nhập</button>

            <div class="form-footer">
                Quên mật khẩu? <a th:href="@{/admin/account/forgot-password}">Đặt lại mật khẩu</a>
            </div>

            <div class="form-footer">
                Chưa có tài khoản? <a th:href="@{/admin/account/register}">Đăng ký</a>
            </div>
        </form>
    </div>

</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const input = document.getElementById('password');
        if (input.type === 'password') {
            input.type = 'text';
            this.textContent = '🙈';
        } else {
            input.type = 'password';
            this.textContent = '👁️';
        }
    });
</script>

</body>
</html>
