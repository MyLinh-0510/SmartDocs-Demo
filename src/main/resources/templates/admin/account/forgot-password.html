<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quên mật khẩu</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      display: flex;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
    }

    /* Khung ảnh bên trái */
    .image-section {
      width: 45%;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      border-right: 1px solid #eee;
      padding: 20px;
    }

    .image-section img {
      width: 100%;
      max-width: 350px;
      border-radius: 10px;
    }

    /* Form bên phải */
    .login-container {
      width: 55%;
      padding: 40px 45px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
      font-size: 26px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #444;
    }

    input[type="email"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      transition: 0.2s;
    }

    input[type="email"]:focus {
      border-color: #007bff;
      outline: none;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
    }

    button {
      width: 100%;
      background-color: #28a745;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 5px;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: #218838;
    }

    .btn-back {
      margin-top: 12px;
      background-color: #6c757d !important;
    }

    .btn-back:hover {
      background-color: #5a6268 !important;
    }

    .alert {
      background-color: #ffdddd;
      color: #d8000c;
      padding: 12px;
      border-left: 4px solid red;
      margin-bottom: 20px;
      border-radius: 6px;
      font-size: 14px;
    }

    .alert-success {
      background-color: #d4edda;
      color: #155724;
      border-left: 4px solid #28a745;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Ảnh bên trái -->
  <div class="image-section">
    <img th:src="@{/images/forgot-password.png}" alt="Forgot Password">
  </div>

  <!-- Form bên phải -->
  <div class="login-container">
    <h1>Quên mật khẩu</h1>

    <div th:if="${error}" class="alert" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/admin/account/forgot-password}" method="post">
      <div class="form-group">
        <label>Email:</label>
        <input type="email" name="email" required>
      </div>

      <button type="submit">Gửi yêu cầu đặt lại mật khẩu</button>

      <a th:href="@{/admin/account/login}">
        <button type="button" class="btn-back">Quay lại đăng nhập</button>
      </a>
    </form>
  </div>

</div>

</body>
</html>
