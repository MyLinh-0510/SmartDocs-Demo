<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Khung tổng */
        .reset-container {
            display: flex;
            background: white;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }

        /* Ảnh bên trái */
        .image-section {
            width: 45%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            border-right: 1px solid #eee;
        }

        .image-section img {
            width: 100%;
            max-width: 350px;
            border-radius: 12px;
        }

        /* Form bên phải */
        .login-container {
            width: 55%;
            padding: 40px 45px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 10px 38px 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            height: 42px;
            box-sizing: border-box;
        }

        /* Icon mắt mật khẩu */
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #666;
            transition: color 0.3s ease;
        }

        .toggle-password:hover,
        .toggle-password.active {
            color: #28a745;
        }

        button {
            width: 100%;
            background-color: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 5px;
        }

        button:hover {
            background-color: #218838;
        }

        /* Nút quay lại */
        .btn-back {
            margin-top: 12px;
            background-color: #6c757d !important;
        }

        .btn-back:hover {
            background-color: #5a6268 !important;
        }

        /* Thông báo */
        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            font-weight: 500;
        }

        .alert-error {
            background-color: #ffdddd;
            color: #d8000c;
            border-left: 4px solid red;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
    </style>
</head>

<body>

<div class="reset-container">

    <!-- Ảnh bên trái -->
    <div class="image-section">
        <img th:src="@{/images/reset-password.png}" alt="Reset Password">
    </div>

    <!-- Form bên phải -->
    <div class="login-container">

        <h1>Đặt lại mật khẩu</h1>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/admin/account/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group">
                <label for="newPassword">Mật khẩu mới:</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" name="newPassword" required>
                    <span class="toggle-password" data-toggle="newPassword">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu:</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <span class="toggle-password" data-toggle="confirmPassword">👁️</span>
                </div>
            </div>

            <button type="submit">Cập nhật mật khẩu</button>

            <!-- Nút quay lại trang quên mật khẩu -->
            <a th:href="@{/admin/account/forgot-password}">
                <button type="button" class="btn-back">Quay lại quên mật khẩu</button>
            </a>
        </form>
    </div>
</div>

<script>
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.addEventListener('click', () => {
            const inputId = icon.getAttribute('data-toggle');
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
                icon.classList.add('active');
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
                icon.classList.remove('active');
            }
        });
    });
</script>

</body>
</html>
