<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân & Đổi mật khẩu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background: #fff;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }

        .card-box {
            max-width: 650px;
            margin: 20px auto;
            padding: 25px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #dee2e6;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .flash-container {
            max-width: 650px;
            margin: 0 auto 15px auto;
        }

        .flash-message {
            padding: 14px 18px;
            border-radius: 8px;
            font-weight: 500;
        }
    </style>

</head>
<body>

<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <div th:insert="fragments/sidebar :: sidebar"></div>

    <div class="main-content">

        <h2 class="page-title">Chỉnh sửa thông tin cá nhân</h2>

        <!-- Flash message -->
        <div class="flash-container">
            <div th:if="${success}" class="alert alert-success flash-message">
                <i class="fa-solid fa-circle-check me-2"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger flash-message">
                <i class="fa-solid fa-circle-xmark me-2"></i>
                <span th:text="${error}"></span>
            </div>
        </div>

        <!-- FORM -->
        <div class="card-box">
            <form th:action="@{/admin/account/profile-edit}" method="post">

                <div class="form-group">
                    <label>Họ tên</label>
                    <input type="text" name="name" th:value="${user.name}" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" th:value="${user.email}" required>
                </div>

                <!-- current password -->
                <div class="form-group">
                    <label>Mật khẩu hiện tại</label>
                    <div class="input-wrapper">
                        <input type="password" id="currentPassword" name="currentPassword">
                        <span class="toggle-password" data-toggle="currentPassword">👁️</span>
                    </div>
                </div>

                <!-- new password -->
                <div class="form-group">
                    <label>Mật khẩu mới</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" name="newPassword">
                        <span class="toggle-password" data-toggle="newPassword">👁️</span>
                    </div>
                </div>

                <!-- confirm password -->
                <div class="form-group">
                    <label>Nhập lại mật khẩu mới</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword">
                        <span class="toggle-password" data-toggle="confirmPassword">👁️</span>
                    </div>
                </div>

                <div class="back-link mt-3 text-center">
                    <a th:href="@{/admin/users/index}" class="btn btn-danger">⬅ Quay lại</a>
                    <button type="submit" class="btn btn-update">💾 Cập nhật</button>
                </div>

            </form>
        </div>

    </div>
</div>


<script>
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.addEventListener('click', () => {
            const id = icon.getAttribute('data-toggle');
            const input = document.getElementById(id);

            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "🙈";
            } else {
                input.type = "password";
                icon.textContent = "👁️";
            }
        });
    });
</script>

</body>
</html>
