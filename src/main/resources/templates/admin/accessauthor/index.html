<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phân quyền truy cập</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
        }

        .main-content h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* Bộ lọc */
        .filter-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            margin-top: 25px;
        }

        .filter-bar label {
            font-weight: 600;
            margin-right: 6px;
        }

        .filter-bar select {
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
        }

        .table th {
            background-color: #f1f1f1;
        }

        /* Checkbox */
        .role-checkbox {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .role-checkbox label {
            font-weight: normal;
        }

        .back-btn-container {
            text-align: center;
            margin-top: 25px;
        }

        form {
            margin: 0;
        }
    </style>

</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <div class="main-content">
        <h2>Phân quyền truy cập tài liệu</h2>

        <!-- Thông báo -->
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <!-- ================= FILTER ================= -->
        <form th:action="@{/admin/accessauthor}" method="get"
              class="filter-box">

            <div class="row g-3">

                <div class="col-lg-3 col-md-6 col-12">
                    <label>Loại file</label>
                    <select name="fileTypeId" class="form-control">
                        <option value="">-- Tất cả --</option>
                        <option th:each="ft : ${fileTypes}"
                                th:value="${ft.id}"
                                th:text="${ft.name}"
                                th:selected="${ft.id == selectedFileTypeId}">
                        </option>
                    </select>
                </div>

                <div class="col-lg-3 col-md-6 col-12">
                    <label>Danh mục</label>
                    <select name="categoryId" class="form-control">
                        <option value="">-- Tất cả --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${cat.id == selectedCategoryId}">
                        </option>
                    </select>
                </div>

                <div class="col-lg-3 col-md-6 col-12">
                    <label>Vai trò</label>
                    <select name="role" class="form-control">
                        <option value="">-- Tất cả --</option>
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}"
                                th:selected="${r == selectedRole}">
                        </option>
                    </select>
                </div>

                <div class="col-12">
                    <div class="col-md-12 d-flex align-items-end justify-content-center gap-3">
                        <button type="submit" class="btn btn-primary btn-fixed">
                            🔍 Lọc
                        </button>

                        <a th:href="@{/admin/accessauthor/index}"
                           class="btn btn-secondary btn-fixed">
                            ❌ Xóa
                        </a>
                    </div>
                </div>


            </div>
        </form>

        <!-- ================= PAGINATION ================= -->
        <div class="d-flex justify-content-end"
             th:if="${totalPages > 1}">
            <nav>
                <ul class="pagination">

                    <li class="page-item"
                        th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/accessauthor/index(page=${currentPage - 1})}">
                            «
                        </a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/admin/accessauthor/index(page=${i})}">
                        </a>
                    </li>

                    <li class="page-item"
                        th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/accessauthor/index(page=${currentPage + 1})}">
                            »
                        </a>
                    </li>

                </ul>
            </nav>
        </div>

        <!-- ================= TABLE ================= -->
        <div class="table-wrapper">
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Tiêu đề</th>
                    <th>Loại file</th>
                    <th>Vai trò xem</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="doc, count : ${documents}">

                    <td th:text="${doc.id}"></td>

                    <td th:text="${doc.title != null
                        ? (doc.title.length() > 20
                        ? doc.title.substring(0, 20) + '...'
                        : doc.title)
                        : 'Không có'}">
                    </td>

                    <td th:text="${doc.fileType != null ? doc.fileType.name : 'Không rõ'}"></td>

                    <td>
                        <ul class="mb-0">
                            <li th:each="r : ${doc.visibleToRoles}"
                                th:if="${r.name() != 'ADMIN'}"
                                th:text="${r}">
                            </li>
                        </ul>
                    </td>

                    <td>
                        <form th:action="@{/admin/accessauthor/update}"
                              method="post"
                              class="role-checkbox">

                            <input type="hidden" name="docId" th:value="${doc.id}"/>

                            <div th:each="r : ${roles}">
                                <label>
                                    <input type="checkbox"
                                           name="roles"
                                           th:value="${r}"
                                           th:checked="${doc.visibleToRoles.contains(r)}"/>
                                    <span th:text="${r}"></span>
                                </label>
                            </div>

                            <button type="submit" class="btn btn-update btn-fixed mt-2">
                                💾 Cập nhật
                            </button>

                            <input type="hidden" th:if="${_csrf != null}"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                        </form>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>

        <!-- ================= BACK ================= -->
        <div class="back-btn-container">
            <a th:href="@{/admin/dashboard}" class="btn btn-danger btn-fixed">
                ⬅ Quay lại Dashboard
            </a>
        </div>

    </div>
</div>

</body>

</html>
