<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết liên hệ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .contact-card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.07);
        }

        .info-box {
            background: #f8f9fc;
            border: 1px solid #e5e7eb;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .info-box label {
            font-weight: 600;
            margin-bottom: 3px;
            color: #374151;
        }

        .info-box p {
            margin: 0;
            color: #1f2937;
        }

        .content-box {
            background: #ffffff;
            border: 1px solid #dce1e6;
            padding: 14px;
            border-radius: 10px;
            white-space: pre-line;
            min-height: 120px;
        }

        .reply-box {
            background: #e8f4ff;
            border: 1px solid #b6d8ff;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            border-left: 4px solid #0d6efd;
            padding-left: 10px;
            color: #1e3a8a;
        }

        .btn-group-custom {
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">
    <!-- SIDEBAR -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h2 class="text-center fw-bold mb-4">📩 Chi tiết liên hệ</h2>

        <div class="contact-card">

            <div class="row g-4">
                <!-- CỘT TRÁI -->
                <div class="col-md-6">
                    <div class="section-title">Thông tin người gửi</div>

                    <div class="info-box">
                        <label>ID:</label>
                        <p th:text="${contact.id}"></p>
                    </div>

                    <div class="info-box">
                        <label>Họ tên:</label>
                        <p th:text="${contact.userName}"></p>
                    </div>

                    <div class="info-box">
                        <label>Số điện thoại:</label>
                        <p th:text="${contact.phone}"></p>
                    </div>

                    <div class="info-box">
                        <label>Email:</label>
                        <p th:text="${contact.userEmail}"></p>
                    </div>

                    <div class="info-box">
                        <label>Ngày gửi:</label>
                        <p th:text="${#temporals.format(contact.createdAt, 'dd/MM/yyyy HH:mm')}"></p>
                    </div>

                    <div class="info-box">
                        <label>Trạng thái:</label>
                        <span th:if="${contact.replied}" class="text-success fw-bold">Đã trả lời</span>
                        <span th:if="${!contact.replied}" class="text-danger fw-bold">Chưa trả lời</span>
                    </div>
                </div>

                <!-- CỘT PHẢI -->
                <div class="col-md-6">
                    <div class="section-title">Nội dung liên hệ</div>

                    <div class="content-box bg-light mb-3"
                         th:text="${contact.message}">
                    </div>

                    <div th:if="${contact.replied}">
                        <div class="section-title mt-4">Nội dung trả lời</div>

                        <div class="content-box reply-box"
                             th:text="${contact.adminReply}">
                        </div>

                        <div class="mt-3">
                            <label class="fw-bold">Ngày trả lời:</label>
                            <p th:text="${#temporals.format(contact.replyDate, 'dd/MM/yyyy HH:mm')}"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- NÚT -->
            <div class="btn-group-custom">
                <a th:href="@{/admin/contact/index}" class="btn btn-danger">
                    ⬅ Quay lại danh sách
                </a>

                <a th:if="${!contact.replied}"
                   th:href="@{'/admin/contact/reply/' + ${contact.id}}"
                   class="btn btn-primary ms-2">
                    💬 Trả lời
                </a>

                <a th:if="${contact.replied}"
                   th:href="@{'/admin/contact/reply/' + ${contact.id}}"
                   class="btn btn-info ms-2">
                    ✏️ Xem / chỉnh sửa trả lời
                </a>

            </div>

        </div>
    </div>
</div>

</body>
</html>
