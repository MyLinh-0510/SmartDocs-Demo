<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết liên hệ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .row {
            word-break: break-word;
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .contact-card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.07);
        }

        .info-box {
            background: #f8f9fc;
            border: 1px solid #e5e7eb;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .info-box label {
            font-weight: 600;
            margin-bottom: 3px;
            color: #374151;
            display: block;
        }

        .info-box p {
            margin: 0;
            color: #1f2937;
            font-weight: 500;
        }

        .content-box {
            background: #ffffff;
            border: 1px solid #dce1e6;
            padding: 16px;
            border-radius: 10px;
            white-space: pre-line;
            line-height: 1.6;
            min-height: 120px;
            word-break: break-word;
            overflow-wrap: break-word;
            word-wrap: break-word;
            max-width: 100%;
        }

        .reply-box {
            background: #e8f4ff;
            border: 1px solid #b6d8ff;
            border-left: 4px solid #0d6efd;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            border-left: 4px solid #0d6efd;
            padding-left: 12px;
            color: #1e3a8a;
        }

        .btn-group-custom {
            margin-top: 30px;
            text-align: center;
        }

        .info-box p {
            margin: 0;
            color: #1f2937;
            font-weight: 500;

            word-break: break-word;
            overflow-wrap: break-word;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:insert="~{fragments/navbar :: navbar}"></div>

<div id="wrapper">
    <!-- SIDEBAR -->
    <div th:insert="~{fragments/sidebar :: sidebar}"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h2 class="text-center fw-bold mb-4">Chi tiết liên hệ</h2>

        <div class="contact-card">

            <div class="row g-4">
                <!-- CỘT TRÁI: THÔNG TIN NGƯỜI GỬI -->
                <div class="col-md-6">
                    <div class="section-title">Thông tin người gửi</div>

                    <div class="info-box">
                        <label>ID liên hệ:</label>
                        <p th:text="${contact.id}">#123</p>
                    </div>

                    <div class="info-box">
                        <label>Họ và tên:</label>
                        <p th:text="${contact.name}">Người dùng</p>
                    </div>

                    <div class="info-box">
                        <label>Số điện thoại:</label>
                        <p th:text="${contact.phone ?: 'Chưa cung cấp'}">—</p>
                    </div>

                    <div class="info-box">
                        <label>Email:</label>
                        <p th:text="${contact.email}">email@example.com</p>
                    </div>

                    <div class="info-box">
                        <label>Ngày gửi:</label>
                        <p th:text="${#temporals.format(contact.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</p>
                    </div>

                    <div class="info-box">
                        <label>Trạng thái:</label>
                        <span th:if="${contact.replied}" class="text-success fw-bold">Đã trả lời</span>
                        <span th:if="${!contact.replied}" class="text-danger fw-bold">Chưa trả lời</span>
                    </div>
                </div>

                <!-- CỘT PHẢI: NỘI DUNG -->
                <div class="col-md-6">
                    <div class="section-title">Nội dung liên hệ từ người dùng</div>

                    <div class="content-box bg-light" th:text="${contact.message}">
                        Nội dung tin nhắn đầu tiên...
                    </div>

                    <!-- PHẦN TRẢ LỜI CŨ (nếu đã trả lời bằng form) -->
                    <div th:if="${contact.replied and contact.adminReply != null and !contact.adminReply.isBlank()}">
                        <div class="section-title mt-4">Trả lời bằng văn bản</div>

                        <div class="content-box reply-box" th:text="${contact.adminReply}">
                            Nội dung trả lời...
                        </div>

                        <div class="mt-2">
                            <small class="text-muted">
                                <i class="far fa-clock"></i>
                                Trả lời lúc:
                                <span th:text="${#temporals.format(contact.replyDate, 'dd/MM/yyyy HH:mm')}"></span>
                            </small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- NÚT HÀNH ĐỘNG -->
            <div class="btn-group-custom">
                <a th:href="@{/admin/contact/index}" class="btn btn-danger">
                    ⬅ Quay lại
                </a>

                <!-- Nút Trả lời bằng form (cách cũ) -->
                <a th:href="@{'/admin/contact/reply/' + ${contact.id}}"
                   class="btn btn-primary ms-2"
                   th:classappend="${contact.replied} ? 'btn-info' : 'btn-primary'"
                   th:text="${contact.replied} ? 'Xem / Sửa trả lời' : 'Trả lời bằng văn bản'">
                    Trả lời
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
