<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Trả lời liên hệ</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link th:href="@{/css/dashboard.css}" rel="stylesheet">
  <link th:href="@{/css/table_button.css}" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fa;
      font-family: 'Segoe UI', sans-serif;
    }

    #wrapper {
      display: flex;
      min-height: 100vh;
    }

    .main-content {
      flex: 1;
      padding: 30px;
    }

    .contact-card {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.07);
    }

    .readonly-box {
      background: #f8f9fc;
      border: 1px solid #e5e7eb;
      padding: 12px 16px;
      border-radius: 8px;
      white-space: pre-line;
      word-wrap: break-word;
    }

    .content-contact{
      background: #ffffff;
      border: 1px solid #dce1e6;
      padding: 16px;
      border-radius: 10px;
      white-space: pre-line;
      line-height: 1.6;
      min-height: 120px;
      word-break: break-word;
      overflow-wrap: break-word;
      word-wrap: break-word;
      max-width: 100%;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

  <!-- Sidebar -->
  <div th:insert="fragments/sidebar :: sidebar"></div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <div class="contact-card">

      <h3 class="text-center mb-4">Trả lời liên hệ</h3>

      <div class="mb-3">
        <label class="fw-bold">Người gửi:</label>
        <div class="readonly-box" th:text="${contact.name}"></div>
      </div>

      <div class="mb-3">
        <label class="fw-bold">Số điện thoại:</label>
        <div class="readonly-box" th:text="${contact.phone}"></div>
      </div>

      <div class="mb-3">
        <label class="fw-bold">Email:</label>
        <div class="readonly-box" th:text="${contact.email}"></div>
      </div>

      <div class="mb-3">
        <label class="fw-bold">Nội dung liên hệ:</label>
        <div class="content-contact" th:text="${contact.message}"></div>
      </div>

      <!-- FORM TRẢ LỜI -->
      <form th:action="@{'/admin/contact/reply/' + ${contact.id}}" method="post">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
          <label class="fw-bold">Trả lời:</label>
          <textarea class="form-control"
                    name="adminReply"
                    rows="5"
                    maxlength="1000"
                    required
                    placeholder="Nhập nội dung trả lời..."></textarea>

          <small class="text-muted">Tối đa 1000 ký tự</small>
        </div>

        <div class="text-center mt-3">
          <a th:href="@{/admin/contact/index}" class="btn btn-danger">⬅ Quay lại</a>
          <button type="submit" class="btn btn-update w-30">📑 Cập nhật</button>
        </div>

      </form>

    </div>

  </div>
</div>

</body>
</html>
