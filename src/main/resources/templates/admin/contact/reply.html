<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trả lời liên hệ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
        }

        .contact-card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.07);
        }

        .readonly-box {
            background: #f8f9fc;
            border: 1px solid #e5e7eb;
            padding: 12px 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <div class="contact-card">

            <h3 class="text-center mb-4">Trả lời liên hệ</h3>

            <div class="mb-3">
                <label class="fw-bold">Người gửi:</label>
                <div class="readonly-box" th:text="${contact.userName}"></div>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Email:</label>
                <div class="readonly-box" th:text="${contact.userEmail}"></div>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Chủ đề:</label>
                <div class="readonly-box" th:text="${contact.subject}"></div>
            </div>

            <div class="mb-3">
                <label class="fw-bold">Nội dung liên hệ:</label>
                <div class="readonly-box" th:text="${contact.message}"></div>
            </div>

            <!-- FORM TRẢ LỜI -->
            <form th:action="@{'/admin/contact/reply/' + ${contact.id}}" method="post">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="fw-bold">Trả lời:</label>
                    <textarea class="form-control" name="adminReply" rows="5"
                              th:text="${contact.adminReply != null ? contact.adminReply : ''}"
                              placeholder="Nhập nội dung trả lời..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100">📨 Gửi trả lời</button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/admin/contact/index}" class="btn btn-danger">⬅ Quay lại danh sách</a>
            </div>

        </div>

    </div>
</div>

</body>
</html>
