<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Danh sách liên hệ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f8; }
        #wrapper { display: flex; min-height: 100vh; }
        .main-content { flex: 1; padding: 30px; background-color: #fff; }
        .main-content h2 { text-align: center; margin-bottom: 30px; font-weight: 600; }

        .table-wrapper { margin-top: 20px; }

        .pagination { margin: 0; font-size: 14px; }
        .pagination .page-link { padding: 6px 12px; border-radius: 6px; }

        .reply-preview {
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }
    </style>
</head>

<body>

<div th:insert="~{fragments/navbar :: navbar}"></div>

<div id="wrapper">
    <div th:insert="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <h2>Danh sách liên hệ</h2>

        <!-- FILTER -->
        <form class="row g-2 mb-3" method="get" th:action="@{/admin/contact/index}">

            <div class="col-md-3">
                <label class="form-label small">Từ ngày</label>
                <input type="date" class="form-control" name="fromDate" th:value="${fromDate}">
            </div>

            <div class="col-md-3">
                <label class="form-label small">Đến ngày</label>
                <input type="date" class="form-control" name="toDate" th:value="${toDate}">
            </div>

            <div class="col-md-3">
                <label class="form-label small">Trạng thái</label>
                <select class="form-select" name="replied">
                    <option value="">-- Tất cả --</option>
                    <option value="true" th:selected="${replied == true}">Đã trả lời</option>
                    <option value="false" th:selected="${replied == false}">Chưa trả lời</option>
                </select>
            </div>

            <div class="col-12 text-center mt-2">
                <button type="submit" class="btn btn-primary">🔍 Lọc</button>
                <a th:href="@{/admin/contact/index}" class="btn btn-secondary">❌ Xóa</a>
            </div>

        </form>

        <!-- Phân trang  -->
        <div class="d-flex justify-content-end mb-3"
             th:if="${contacts.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm">

                    <!-- Previous -->
                    <li class="page-item"
                        th:classappend="${contacts.number == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/contact/index(
                            page=${contacts.number - 1},
                            size=${contacts.size}
                       )}">«</a>
                    </li>

                    <!-- Page numbers -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, contacts.totalPages - 1)}"
                        th:classappend="${i == contacts.number} ? 'active'">
                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/admin/contact/index(
                            page=${i},
                            size=${contacts.size}
                       )}"></a>
                    </li>

                    <!-- Next -->
                    <li class="page-item"
                        th:classappend="${contacts.number + 1 == contacts.totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/contact/index(
                            page=${contacts.number + 1},
                            size=${contacts.size}
                       )}">»</a>
                    </li>

                </ul>
            </nav>
        </div>

        <!-- TABLE -->
        <div class="table-wrapper">
            <table class="table table-bordered table-striped">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Người gửi</th>
                    <th>Nội dung</th>
                    <th>Trả lời admin</th>
                    <th>Ngày nhận</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="c : ${contacts.content}">
                    <td th:text="${c.id}"></td>

                    <td th:text="${c.name}"></td>

                    <td th:text="${c.message != null && c.message.length() > 50
                        ? c.message.substring(0,50) + '...'
                        : c.message}"></td>

                    <td>
                        <span class="reply-preview"
                              th:text="${c.adminReply != null
                                ? (c.adminReply.length() > 40 ? c.adminReply.substring(0,40) + '...' : c.adminReply)
                                : '—'}">
                        </span>
                    </td>

                    <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

                    <td>
                        <span th:if="${c.replied}" class="badge bg-success">Đã trả lời</span>
                        <span th:if="${!c.replied}" class="badge bg-warning text-dark">Chưa trả lời</span>
                    </td>

                    <td class="action-buttons">
                        <a th:href="@{'/admin/contact/detail/' + ${c.id}}"
                           class="btn btn-sm btn-primary">👁️ Xem</a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(contacts.content)}">
                    <td colspan="7" class="text-center text-muted py-4">
                        📭 Không có dữ liệu
                    </td>
                </tr>

                </tbody>

            </table>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/admin/dashboard}" class="btn btn-danger">
                ⬅ Quay lại Dashboard
            </a>
        </div>

    </div>
</div>

</body>
</html>
