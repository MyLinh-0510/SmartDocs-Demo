<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách liên hệ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
        }

        .main-content h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .table-wrapper {
            margin-top: 20px;
        }

        .status-replied {
            color: green;
            font-weight: bold;
        }

        .status-pending {
            color: red;
            font-weight: bold;
        }
    </style>

</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div class="main-content">

        <h1>Danh sách liên hệ</h1>

        <div class="table-wrapper">
            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Người gửi</th>
                    <th>Email</th>
                    <th>Nội dung</th>
                    <th>Ngày nhận</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="c : ${contacts}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.userName}"></td>
                    <td th:text="${c.userEmail}"></td>
                    <td th:text="${c.message}"></td>
                    <td th:text="${c.createdAt}"></td>

                    <td>
                        <span th:if="${c.replied}"
                              class="status-replied">Đã trả lời</span>

                        <span th:if="${!c.replied}"
                              class="status-pending">Chưa trả lời</span>
                    </td>

                    <td>
                        <a th:href="@{'/admin/contact/detail/' + ${c.id}}"
                           class="btn btn-view">👁️ Xem</a>

                        <a th:if="${!c.replied}"
                           th:href="@{'/admin/contact/reply/' + ${c.id}}"
                           class="btn btn-info">💬 Trả lời</a>

                        <a th:if="${c.replied}"
                           th:href="@{'/admin/contact/reply/' + ${c.id}}"
                           class="btn btn-info">✏️ Xem trả lời</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="back-link mt-3 text-center">
            <a th:href="@{/admin/dashboard}" class="btn btn-danger">⬅ Quay lại Dashboard</a>
        </div>

    </div>
</div>

</body>
</html>
