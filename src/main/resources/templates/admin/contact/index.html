<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Danh sách liên hệ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
        }

        .main-content h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .table-wrapper {
            margin-top: 20px;
        }

        table {
            table-layout: fixed;
        }

        .pagination {
            margin: 0;
            font-size: 14px;
        }

        .pagination .page-link {
            padding: 6px 12px;
            border-radius: 6px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        /* ====== FIX WIDTH COLUMNS ====== */

        /* ID nhỏ gọn */
        .col-id {
            width: 70px;
            max-width: 70px;
            text-align: center;
        }

        /* Name hiển thị full */
        .col-name {
            width: 180px;
            white-space: normal;
            word-break: break-word;
        }

        /* Nội dung */
        .col-message {
            width: 260px;
            max-width: 260px;
        }

        /* Admin reply */
        .col-reply {
            width: 220px;
            max-width: 220px;
        }

        /* Ellipsis dùng cho nội dung dài */
        .text-ellipsis {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

    </style>
</head>

<body>

<div th:insert="~{fragments/navbar :: navbar}"></div>

<div id="wrapper">
    <div th:insert="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <h2>Danh sách liên hệ</h2>

        <!-- FILTER -->
        <form class="row g-2 mb-3" method="get" th:action="@{/admin/contact/index}">

            <div class="col-md-3">
                <label class="form-label small">Từ ngày</label>
                <input type="date" class="form-control" name="fromDate" th:value="${fromDate}">
            </div>

            <div class="col-md-3">
                <label class="form-label small">Đến ngày</label>
                <input type="date" class="form-control" name="toDate" th:value="${toDate}">
            </div>

            <div class="col-md-3">
                <label class="form-label small">Trạng thái</label>
                <select class="form-select" name="replied">
                    <option value="">-- Tất cả --</option>
                    <option value="true" th:selected="${replied == true}">Đã trả lời</option>
                    <option value="false" th:selected="${replied == false}">Chưa trả lời</option>
                </select>
            </div>

            <div class="col-12 text-center mt-2">
                <button type="submit" class="btn btn-primary">🔍 Lọc</button>
                <a th:href="@{/admin/contact/index}" class="btn btn-secondary">❌ Xóa</a>
            </div>

        </form>

        <!-- PAGINATION -->
        <div class="d-flex justify-content-end mb-3"
             th:if="${contacts.totalPages > 1}">
            <nav>
                <ul class="pagination pagination-sm">

                    <li class="page-item"
                        th:classappend="${contacts.number == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/contact/index(page=${contacts.number - 1}, size=${contacts.size})}">«</a>
                    </li>

                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, contacts.totalPages - 1)}"
                        th:classappend="${i == contacts.number} ? 'active'">
                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/admin/contact/index(page=${i}, size=${contacts.size})}"></a>
                    </li>

                    <li class="page-item"
                        th:classappend="${contacts.number + 1 == contacts.totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/contact/index(page=${contacts.number + 1}, size=${contacts.size})}">»</a>
                    </li>

                </ul>
            </nav>
        </div>

        <!-- TABLE -->
        <div class="table-wrapper">
            <table class="table table-bordered table-striped">

                <thead>
                <tr>
                    <th class="col-id">ID</th>
                    <th class="col-name">Người gửi</th>
                    <th class="col-message">Nội dung</th>
                    <th class="col-reply">Trả lời admin</th>
                    <th>Ngày nhận</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="c : ${contacts.content}">
                    <td class="col-id" th:text="${c.id}"></td>

                    <!-- ✅ NAME FULL -->
                    <td class="col-name" th:text="${c.name}"></td>

                    <!-- MESSAGE -->
                    <td class="col-message">
                        <div class="text-ellipsis"
                             th:text="${c.message}"
                             th:title="${c.message}">
                        </div>
                    </td>

                    <!-- ADMIN REPLY -->
                    <td class="col-reply">
                        <div class="text-ellipsis"
                             th:text="${c.adminReply != null ? c.adminReply : '—'}"
                             th:title="${c.adminReply}">
                        </div>
                    </td>

                    <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

                    <td>
                        <span th:if="${c.replied}" class="badge bg-success">Đã trả lời</span>
                        <span th:if="${!c.replied}" class="badge bg-warning text-dark">Chưa trả lời</span>
                    </td>

                    <td class="action-buttons">
                        <a th:href="@{'/admin/contact/detail/' + ${c.id}}"
                           class="btn btn-sm btn-primary">👁️ Xem</a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(contacts.content)}">
                    <td colspan="7" class="text-center text-muted py-4">
                        📭 Không có dữ liệu
                    </td>
                </tr>

                </tbody>

            </table>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/admin/dashboard}" class="btn btn-danger">
                ⬅ Quay lại Dashboard
            </a>
        </div>

    </div>
</div>

</body>
</html>
