<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title th:text="${doc.title}">Chi tiết tài liệu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>    <link th:href="@{/css/dashboard.css}" rel="stylesheet"> <!-- CSS Dashboard -->
    <link th:href="@{/css/table_button.css}" rel="stylesheet"> <!-- CSS cho bảng và nút -->

    <style>
        /* Layout riêng của trang này */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
        }

        .main-content h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .add {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<!-- Layout -->
<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <div class="main-content">
        <h1 th:text="${doc.title}">Chi tiết tài liệu</h1>

        <!-- Thông tin tài liệu -->
        <div class="info">
            <p><strong>Mô tả:</strong> <span th:text="${doc.description}">Không có mô tả</span></p>
            <p><strong>Loại file:</strong> <span th:text="${doc.fileType != null ? doc.fileType.name : 'Không rõ'}"></span></p>
            <p><strong>Dung lượng:</strong>
                <span th:text="|${#numbers.formatDecimal(doc.size / 1024.0 / 1024.0, 1, 2)} MB|"></span>
            </p>
            <p><strong>Ngày tạo:</strong> <span th:text="${#temporals.format(doc.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>
            <p><strong>Trạng thái:</strong>
                <span th:text="${doc.isVisible ? 'Công khai' : 'Riêng tư'}"></span>
            </p>
        </div>

        <!-- Xem trước tài liệu -->
        <div class="preview">
            <h3>Xem trước tài liệu</h3>

            <!-- 🖼 Hình ảnh -->
            <img th:if="${#strings.startsWith(doc.mimeType, 'image/')}"
                 th:src="@{'/uploads/' + ${doc.filename}}"
                 alt="Preview"/>

            <!-- 📄 PDF -->
            <iframe th:if="${#strings.equals(doc.mimeType, 'application/pdf')}"
                    th:src="@{'/uploads/' + ${doc.filename}}"></iframe>

            <!-- 🧩 Word & Excel -->
            <div th:if="${#strings.containsIgnoreCase(doc.mimeType, 'word')
                         or #strings.containsIgnoreCase(doc.mimeType, 'excel')}">

                <div id="loadingMsg">⏳ Đang tải bản xem trước...</div>
                <div id="previewArea"></div>
                <div id="previewError">❌ Không thể xem trước. Vui lòng tải về.</div>

                <script th:inline="javascript">
                    const baseUrl = /*[[${publicBaseUrl}]]*/ '';
                    const filename = /*[[${encodedFilename}]]*/ '';
                    const fileUrl = baseUrl + '/uploads/' + filename;
                    const mimeType = /*[[${doc.mimeType}]]*/ '';

                    const previewArea = document.getElementById("previewArea");
                    const errorDiv = document.getElementById("previewError");
                    const loadingMsg = document.getElementById("loadingMsg");

                    fetch(fileUrl)
                        .then(resp => {
                            if (!resp.ok) throw new Error("Không tải được file");
                            return resp.arrayBuffer();
                        })
                        .then(buffer => {
                            loadingMsg.style.display = "none";

                            if (mimeType.includes("word")) {
                                mammoth.convertToHtml({ arrayBuffer: buffer })
                                    .then(res => {
                                        previewArea.innerHTML = res.value;
                                        previewArea.style.display = "block";
                                    })
                                    .catch(() => errorDiv.style.display = "block");
                            } else if (mimeType.includes("excel")) {
                                const workbook = XLSX.read(buffer, { type: "array" });
                                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                                previewArea.innerHTML = XLSX.utils.sheet_to_html(sheet);
                                previewArea.style.display = "block";
                            } else {
                                errorDiv.style.display = "block";
                            }
                        })
                        .catch(() => {
                            loadingMsg.style.display = "none";
                            errorDiv.style.display = "block";
                        });
                </script>
            </div>
        </div>

        <div class="back-link mt-3 text-center">
            <a th:href="@{/admin/documents/index}" class="btn btn-danger">⬅ Quay lại</a>
            <a th:href="@{'/admin/documents/edit/' + ${doc.id}}"class="btn btn-info">✏️ Sửa</a>
            <a th:href="@{'/uploads/' + ${doc.filename}}" target="_blank" class="btn btn-update">⬇ Tải file</a>
        </div>
    </div>
</div>

</body>
</html>
