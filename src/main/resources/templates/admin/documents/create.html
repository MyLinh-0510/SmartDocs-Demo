<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm tài liệu mới</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 40px 30px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-content h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .create-document-form {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            margin-top: 20px;
            background: #fff;
            padding: 25px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        .form-group textarea {
            resize: vertical;
        }

        .upload-overlay{
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            z-index:9999;
        }

        .upload-card{
            width:420px;
            margin:180px auto;
            background:#fff;
            padding:25px;
            border-radius:16px;
            text-align:center;
            box-shadow:0 20px 50px rgba(0,0,0,0.2);
        }

        .progress-wrapper{
            position:relative;
            margin-top:15px;
        }

        .progress-container{
            height:14px;
            background:#eee;
            border-radius:20px;
            overflow:hidden;
        }

        #progressBar{
            height:100%;
            width:0%;
            background:linear-gradient(90deg,#00c853,#69f0ae);
            transition: width 0.4s ease;
        }

        #turtle{
            position:absolute;
            top:-30px;
            left:0;
            font-size:24px;
            transition: left 0.4s ease;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <div class="main-content">
        <h1>Thêm tài liệu mới</h1>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Form -->
        <form th:action="@{/admin/documents/create}" class="create-document-form" method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label for="title">Tiêu đề</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="file">Chọn file tài liệu</label>
                <input type="file" id="file" name="file" required>
            </div>

            <div class="form-group">
                <label for="description">Mô tả</label>
                <textarea id="description" name="description" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="fileTypeId">Loại tài liệu</label>
                <select name="fileTypeId" id="fileTypeId" required>
                    <option value="">-- Chọn loại tài liệu --</option>
                    <option th:each="type : ${fileTypes}"
                            th:value="${type.id}"
                            th:text="${type.name}"></option>
                </select>
            </div>

            <!-- Thêm chọn danh mục -->
            <div class="form-group">
                <label for="categoryId">Danh mục</label>
                <select name="categoryId" id="categoryId" required>
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"></option>
                </select>
            </div>

            <!-- Meta tự động -->
            <input type="hidden" id="meta" name="meta">

            <script>
                document.getElementById("title").addEventListener("input", function () {
                    const title = this.value.toLowerCase()
                        .normalize("NFD")
                        .replace(/[\u0300-\u036f]/g, "")
                        .replace(/\s+/g, "-")
                        .replace(/[^a-z0-9-]/g, "");

                    const randomSuffix = Math.random().toString(36).substring(2, 8);
                    document.getElementById("meta").value = title + "-" + randomSuffix;
                });
            </script>

            <div class="form-group">
                <div class="d-flex align-items-center gap-3">
                    <label class="form-label mb-0 fw-semibold">
                        Trạng thái
                    </label>

                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input"
                               type="checkbox"
                               id="isVisible"
                               name="isVisible"
                               checked
                               onchange="updateVisibilityLabel(this)">
                    </div>

                    <span class="fw-semibold text-success"
                          id="visibilityLabel">
                        Công khai
                    </span>
                </div>
            </div>

            <div class="mt-4 text-center">
                <a th:href="@{/admin/documents/create-multiple}" class="btn btn-success">📂 Upload nhiều file</a>
                <a th:href="@{/admin/documents/index}" class="btn btn-danger">⬅ Quay lại</a>
                <button type="submit" class="btn btn-info">💾 Tạo tài liệu</button>
            </div>

        </form>

    </div>
</div>

<!-- Popup con rùa -->
<div id="uploadPopup" class="upload-overlay">
    <div class="upload-card">
        <h5>🚀 Đang upload tài liệu</h5>

        <div class="progress-wrapper">
            <div id="turtle">🐢</div>

            <div class="progress-container">
                <div id="progressBar"></div>
            </div>
        </div>

        <p id="progressText">Đang chuẩn bị...</p>
    </div>
</div>

<script>
    const form = document.querySelector(".create-document-form");
    const popup = document.getElementById("uploadPopup");

    let isUploading = false;

    form.addEventListener("submit", function(e){
        e.preventDefault();

        if(isUploading) return;
        isUploading = true;

        popup.style.display = "block";

        const formData = new FormData(form);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", form.action);

        // CSRF
        const token = document.querySelector('meta[name="_csrf"]')?.content;
        const header = document.querySelector('meta[name="_csrf_header"]')?.content;
        if(token && header) xhr.setRequestHeader(header, token);

        let done = false;

        xhr.upload.onprogress = function(e){
            if(e.lengthComputable){
                let percent = Math.round((e.loaded / e.total) * 100);

                const bar = document.getElementById("progressBar");
                const turtle = document.getElementById("turtle");
                const text = document.getElementById("progressText");

                bar.style.width = percent + "%";
                turtle.style.left = `calc(${percent}% - 12px)`;

                text.innerText = "Đang upload... " + percent + "%";

                // ✅ đạt 100%
                if(percent >= 100 && !done){
                    done = true;

                    bar.style.width = "100%";
                    turtle.style.left = "calc(100% - 12px)";
                    text.innerText = "Hoàn tất 🎉";

                    // ⏱️ delay nhẹ cho đẹp UI
                    setTimeout(() => {
                        window.location.href = "/admin/documents/index?success=1";
                    }, 700);
                }
            }
        };

        xhr.onerror = function(){
            alert("❌ Upload thất bại!");
            popup.style.display = "none";
            isUploading = false;
        };

        xhr.send(formData);
    });
</script>


<script>
    function updateVisibilityLabel(checkbox) {
        const label = document.getElementById("visibilityLabel");
        if (checkbox.checked) {
            label.textContent = "Công khai";
            label.classList.remove("text-danger");
            label.classList.add("text-success");
        } else {
            label.textContent = "Riêng tư";
            label.classList.remove("text-success");
            label.classList.add("text-danger");
        }
    }
</script>


</body>
</html>
