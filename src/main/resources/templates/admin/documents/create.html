<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm tài liệu mới</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 40px 30px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-content h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .create-document-form {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            margin-top: 20px;
            background: #fff;
            padding: 25px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        .form-group textarea {
            resize: vertical;
        }

        .error-messages {
            background-color: #ffe6e6;
            border: 1px solid #ff5c5c;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            color: #a94442;
        }

        .form-actions {
            text-align: center; /* ✅ Căn giữa 2 nút */
            margin-top: 25px;
        }

        .form-actions .btn {
            margin: 0 8px; /* khoảng cách giữa hai nút */
        }

        @media (max-width: 720px) {
            .form-actions {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .form-actions .btn {
                width: 100%;
                max-width: 250px;
                margin: 6px 0;
            }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <div class="main-content">
        <h1>Thêm tài liệu mới</h1>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Form -->
        <form th:action="@{/admin/documents/create}" class="create-document-form" method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label for="title">Tiêu đề</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="file">Chọn file tài liệu</label>
                <input type="file" id="file" name="file" required>
            </div>

            <div class="form-group">
                <label for="description">Mô tả</label>
                <textarea id="description" name="description" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="fileTypeId">Loại tài liệu</label>
                <select name="fileTypeId" id="fileTypeId" required>
                    <option value="">-- Chọn loại tài liệu --</option>
                    <option th:each="type : ${fileTypes}"
                            th:value="${type.id}"
                            th:text="${type.name}"></option>
                </select>
            </div>

            <!-- ✅ Thêm chọn danh mục -->
            <div class="form-group">
                <label for="categoryId">Danh mục</label>
                <select name="categoryId" id="categoryId" required>
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"></option>
                </select>
            </div>

            <!-- ✅ Meta tự động -->
            <input type="hidden" id="meta" name="meta">

            <script>
                document.getElementById("title").addEventListener("input", function () {
                    const title = this.value.toLowerCase()
                        .normalize("NFD") // bỏ dấu
                        .replace(/[\u0300-\u036f]/g, "")
                        .replace(/\s+/g, "-") // dùng dấu gạch ngang đẹp hơn cho meta
                        .replace(/[^a-z0-9-]/g, "");

                    // thêm chuỗi ngẫu nhiên (6 ký tự) để tránh trùng
                    const randomSuffix = Math.random().toString(36).substring(2, 8);
                    document.getElementById("meta").value = title + "-" + randomSuffix;
                });
            </script>



            <div class="form-group">
                <label>
                    <input type="checkbox" id="isVisible" name="isVisible" checked>
                    Hiển thị tài liệu công khai
                </label>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/documents/index}" class="btn btn-danger">⬅ Quay lại</a>
                <button type="submit" class="btn btn-info">💾 Tạo tài liệu</button>
            </div>

        </form>




    </div>
</div>


</body>
</html>
