<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Danh sách tài liệu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link th:href="@{/css/dashboard.css}" rel="stylesheet">
  <link th:href="@{/css/table_button.css}" rel="stylesheet">

  <style>
    /* Layout riêng của trang này */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f8;
    }

    #wrapper {
      display: flex;
      min-height: 100vh;
    }

    .main-content {
      flex: 1;
      padding: 30px;
      background-color: #fff;
    }

    .main-content h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    .add {
      margin-bottom: 30px;
    }
  </style>

</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<!-- Layout -->
<div id="wrapper">

  <!-- Sidebar -->
  <div th:insert="fragments/sidebar :: sidebar"></div>

  <!-- Main Content -->
  <div class="main-content">

    <h1>Danh sách tài liệu</h1>

    <!-- Nút thêm mới -->
    <div class="add">
      <a th:href="@{/admin/documents/create}" class="btn btn-add">➕ Thêm tài liệu mới</a>
    </div>

    <div class="table-wrapper">
      <table class="table">
        <thead>
        <tr>
          <th>ID</th>
          <th>Tiêu đề</th>
          <th>Loại file</th>
          <th>Dung lượng</th>
          <th>Trạng thái</th>
          <th>Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="doc : ${documents}">
          <td th:text="${doc.id}">1</td>

          <td th:text="${doc.title != null ? doc.title : 'Không có tiêu đề'}">Tiêu đề</td>

          <td th:text="${doc.fileType == null ? 'Không rõ' : doc.fileType.name}">Loại</td>

          <td th:text="${doc.size != null ? #numbers.formatDecimal(doc.size / 1024.0 / 1024.0, 1, 2) + ' MB' : 'N/A'}">0 MB</td>

          <td th:text="${doc.isVisible != null && doc.isVisible ? 'Công khai' : 'Riêng tư'}">Trạng thái</td>

          <td>
            <a th:href="@{'/admin/documents/view/' + ${doc.id}}"
               class="btn btn-view" target="_blank">👁️ Xem file</a>

            <a th:href="@{'/admin/documents/edit/' + ${doc.id}}"
               class="btn btn-info">✏️ Sửa</a>

            <form th:action="@{'/admin/documents/delete/' + ${doc.id}}" method="post" style="display:inline;">
              <div th:if="${_csrf != null}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              </div>
              <button type="submit" class="btn btn-danger"
                      onclick="return confirm('Xác nhận xoá tài liệu này?')">🗑️ Xoá</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- Back -->
    <div class="back-link mt-3 text-center">
      <a th:href="@{/admin/dashboard}" class="btn btn-danger">⬅ Quay lại Dashboard</a>
    </div>

  </div>
</div>

</body>
</html>
