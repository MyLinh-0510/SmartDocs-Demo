<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Danh sách tài liệu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link th:href="@{/css/dashboard.css}" rel="stylesheet">
  <link th:href="@{/css/table_button.css}" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f8;
    }

    #wrapper {
      display: flex;
      min-height: 100vh;
    }

    .main-content {
      flex: 1;
      padding: 30px;
      background-color: #fff;
    }

    .main-content h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    .main-content form.row.g-2 {
      margin-top: 25px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }

    .file-title i{
      color:#1a73e8;
      font-size:20px;
    }

    .remove-btn i{
      font-size:14px;
      pointer-events:none;
    }

  </style>

</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<!-- Layout -->
<div id="wrapper">

  <!-- Sidebar -->
  <div th:insert="fragments/sidebar :: sidebar"></div>

  <!-- Main Content -->
  <div class="main-content">

    <h2>Danh sách tài liệu</h2>

    <!-- Thông báo thành công multiple -->
    <div th:if="${multiMessage}" class="alert alert-success">
      <span th:text="${multiMessage}"></span>
    </div>

    <!-- Thông báo lỗi -->
    <div th:if="${error}" class="alert alert-danger" style="font-size: 16px;">
      <span th:text="${error}"></span>
    </div>

    <!-- Nút thêm -->
    <div class="d-flex gap-3 mb-3">
      <a th:href="@{/admin/documents/create-multiple}" class="btn btn-success">
        <i class="fa-solid fa-upload"></i> Thêm tài liệu mới
      </a>
    </div>
    <!-- Lọc -->
    <form class="row g-2 mb-3"
          method="get"
          th:action="@{/admin/documents/index}">

      <!-- DANH MỤC -->
      <div class="col-md-3">
        <label class="form-label small">Danh mục</label>
        <select class="form-select" name="categoryId">
          <option value="">-- Tất cả --</option>
          <option th:each="c : ${categories}"
                  th:value="${c.id}"
                  th:text="${c.name}"
                  th:selected="${categoryId == c.id}">
          </option>
        </select>
      </div>

      <!-- LOẠI FILE -->
      <div class="col-md-3">
        <label class="form-label small">Loại file</label>
        <select class="form-select" name="fileTypeId">
          <option value="">-- Tất cả --</option>
          <option th:each="f : ${fileTypes}"
                  th:value="${f.id}"
                  th:text="${f.name}"
                  th:selected="${fileTypeId == f.id}">
          </option>
        </select>
      </div>

      <!-- TRẠNG THÁI -->
      <div class="col-md-3">
        <label class="form-label small">Trạng thái</label>
        <select class="form-select" name="status">
          <option value="">-- Tất cả --</option>
          <option th:each="s : ${T(edu.uni.smartdocs.models.DocumentStatus).values()}"
                  th:value="${s}"
                  th:selected="${status == s}"
                  th:switch="${s.name()}">

            <span th:case="'DRAFT'">Bản nháp</span>
            <span th:case="'PENDING_APPROVAL'">Chờ duyệt</span>
            <span th:case="'APPROVED'">Đã duyệt</span>
            <span th:case="'REJECTED'">Bị từ chối</span>

          </option>
        </select>
      </div>

      <!-- NÚT -->
      <div class="col-12">
        <div class="col-md-12 d-flex align-items-end justify-content-center gap-3">
          <button type="submit" class="btn btn-primary btn-fixed">
            🔍 Lọc
          </button>

          <a th:href="@{/admin/documents/index}"
             class="btn btn-secondary btn-fixed">
            ❌ Xóa
          </a>
        </div>
      </div>

    </form>


    <!-- Phân trang -->
    <div class="d-flex justify-content-end mb-3"
         th:if="${totalPages > 1}">
      <nav>
        <ul class="pagination mb-0">

          <!-- PREVIOUS -->
          <li class="page-item"
              th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/documents/index(page=${currentPage - 1})}">
              «
            </a>
          </li>

          <!-- PAGE NUMBERS -->
          <li class="page-item"
              th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
              th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link"
               th:href="@{/admin/documents/index(page=${i})}"
               th:text="${i + 1}">
            </a>
          </li>

          <!-- NEXT -->
          <li class="page-item"
              th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/documents/index(page=${currentPage + 1})}">
              »
            </a>
          </li>

        </ul>
      </nav>
    </div>

    <div class="table-wrapper">
      <table class="table">
        <thead>
        <tr>
          <th>ID</th>
          <th>Tiêu đề</th>
          <th>Danh mục</th>
          <th>Loại file</th>
          <th>Dung lượng</th>
          <th>Trạng thái</th>
          <th>Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="doc : ${documents}">
          <td th:text="${doc.id}">1</td>

          <td th:text="${doc.title != null
          ? (doc.title.length() > 20
              ? doc.title.substring(0, 20) + '...'
              : doc.title)
          : 'Không có tiêu đề'}">
                  Tiêu đề
          </td>

          <td th:text="${doc.category != null ? doc.category.name : 'Chưa phân loại'}">Danh mục</td>

          <td th:text="${doc.fileType != null ? doc.fileType.name : 'Chưa xác định'}">Loại file </td>

          <td th:text="${doc.size != null ? #numbers.formatDecimal(doc.size / 1024.0 / 1024.0, 1, 2) + ' MB' : 'N/A'}">0 MB</td>

          <td th:text="${doc.isVisible != null && doc.isVisible ? 'Công khai' : 'Riêng tư'}">Trạng thái</td>

          <td>
            <div class="action-buttons">
              <a th:href="@{'/admin/documents/detail/' + ${doc.id}}"
                 class="btn btn-view">👁️ Xem</a>

              <a th:href="@{'/admin/documents/edit/' + ${doc.id}}"
                 class="btn btn-info">✏️ Sửa</a>

              <form th:action="@{'/admin/documents/delete/' + ${doc.id}}"
                    method="post">
                <div th:if="${_csrf != null}">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </div>
                <button type="submit" class="btn btn-danger"
                        onclick="return confirm('Xác nhận xoá tài liệu này?')">
                  🗑️ Xoá
                </button>
              </form>
            </div>
          </td>

        </tr>

        </tbody>
      </table>
    </div>

    <!-- Back -->
    <div class="back-link mt-3 text-center">
      <a th:href="@{/admin/dashboard}" class="btn btn-danger">⬅ Quay lại Dashboard</a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  setTimeout(function () {
    document.querySelectorAll('.alert').forEach(function (alert) {
      alert.style.transition = "opacity 0.4s";
      alert.style.opacity = "0";
      setTimeout(() => alert.remove(), 400);
    });
  }, 5000);
</script>


</body>
</html>
