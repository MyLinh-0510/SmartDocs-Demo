<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa tài liệu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet"> <!-- CSS Dashboard -->
    <link th:href="@{/css/table_button.css}" rel="stylesheet"> <!-- CSS cho bảng và nút -->
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 40px 30px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-content h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .edit-document-form {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            margin-top: 20px;
            background: #fff;
            padding: 25px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        .form-group textarea {
            resize: vertical;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            border: none;
        }

        .error-messages {
            background-color: #ffe6e6;
            border: 1px solid #ff5c5c;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            color: #a94442;
        }

        .form-actions {
            text-align: center; /* ✅ Căn giữa 2 nút */
            margin-top: 25px;
        }

        .form-actions .btn {
            margin: 0 8px; /* khoảng cách giữa hai nút */
        }

        @media (max-width: 720px) {
            .form-actions {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .form-actions .btn {
                width: 100%;
                max-width: 250px;
                margin: 6px 0;
            }
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <div class="main-content">
        <h1>Chỉnh sửa tài liệu</h1>

        <!-- Hiển thị lỗi -->
        <div th:if="${errors}" class="error-messages">
            <ul>
                <li th:each="err : ${errors}" th:text="${err}"></li>
            </ul>
        </div>

        <!-- Form -->
        <form th:action="@{'/admin/documents/edit/' + ${document.id}}" class="edit-document-form" method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label for="title">Tiêu đề</label>
                <input type="text" id="title" name="title"
                       th:value="${document.title}" required>
            </div>

            <div class="form-group">
                <label>File hiện tại</label>
                <p>
                    <a th:href="@{'/uploads/' + ${document.filePath}}" target="_blank"
                       th:text="${document.filePath}"></a>
                </p>
            </div>

            <div class="form-group">
                <label for="file">Tải file mới (không bắt buộc)</label>
                <input type="file" id="file" name="file">
            </div>

            <div class="form-group">
                <label for="description">Mô tả</label>
                <textarea id="description" name="description" rows="4"
                          th:text="${document.description}"></textarea>
            </div>

            <div class="form-group">
                <label for="fileTypeId">Loại tài liệu</label>
                <select name="fileTypeId" id="fileTypeId" required>
                    <option value="">-- Chọn loại tài liệu --</option>
                    <option th:each="type : ${fileTypes}"
                            th:value="${type.id}"
                            th:selected="${type.id == document.fileType.id}"
                            th:text="${type.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="categoryId">Danh mục</label>
                <select name="categoryId" id="categoryId" required>
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:selected="${cat.id == document.category.id}"
                            th:text="${cat.name}">
                    </option>
                </select>
            </div>

            <!-- Meta giữ nguyên -->
            <input type="hidden" id="meta" name="meta" th:value="${document.meta}">

            <div class="form-group">
                <label>
                    <input type="checkbox" id="isVisible" name="isVisible"
                           th:checked="${document.isVisible}">
                    Hiển thị tài liệu công khai
                </label>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/documents/index}" class="btn btn-danger">⬅ Quay lại</a>
                <button type="submit" class="btn btn-update">💾 Cập nhật</button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
