<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách danh mục</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
        }

        .main-content h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .add {
            margin-bottom: 30px;
        }
    </style>

</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <div class="main-content">

        <h1>Danh sách danh mục</h1>

        <!-- Nút thêm -->
        <div class="add">
            <a th:href="@{/admin/categories/create}" class="btn btn-add">➕ Thêm danh mục</a>
        </div>

        <div class="table-wrapper">
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên danh mục</th>
                    <th>Mô tả</th>
                    <th>Số tài liệu</th>
                    <th>Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="cat, iterStat : ${categories}">
                    <td th:text="${iterStat.index + 1}">1</td>
                    <td th:text="${cat.name}">Văn bản</td>
                    <td th:text="${cat.description != null ? cat.description : '-'}">Mô tả</td>
                    <td th:text="${cat.documents != null ? #lists.size(cat.documents) : 0}">0</td>

                    <td>
                        <!-- nút sửa -->
                        <a th:href="@{'/admin/categories/edit/' + ${cat.id}}"
                           class="btn btn-edit">
                            ✏️ Sửa
                        </a>

                        <!-- nút xoá -->
                        <form th:action="@{'/admin/categories/delete/' + ${cat.id}}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger"
                                    onclick="return confirm('Xác nhận xoá danh mục này?')">
                                🗑️ Xoá
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(categories)}">
                    <td colspan="6" style="text-align:center; padding:20px;">
                        Chưa có danh mục nào.
                    </td>
                </tr>
                </tbody>

            </table>
        </div>

        <div class="back-link mt-3 text-center">
            <a th:href="@{/admin/dashboard}" class="btn btn-danger">⬅ Quay lại Dashboard</a>
        </div>

    </div>
</div>

</body>
</html>
