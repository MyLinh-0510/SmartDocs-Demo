<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa danh mục</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS chung -->
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>
        /* Layout chung */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-content h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* Form */
        .edit-cate-form {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            margin-top: 20px;
            background: #fff;
            padding: 25px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        @media (max-width: 720px) {
            form { padding: 15px; }
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<!-- Layout -->
<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div class="main-content">
        <h1>Chỉnh sửa danh mục</h1>

        <form th:action="@{/admin/categories/update/{id}(id=${category.id})}" class="edit-cate-form" th:object="${category}" method="post">
            <input type="hidden" th:field="*{id}" />

            <label for="name">Tên danh mục:</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Nhập tên danh mục..." required>

            <label for="description">Mô tả:</label>
            <textarea id="description" th:field="*{description}" rows="4" placeholder="Nhập mô tả..."></textarea>

            <div class="back-link mt-3 text-center">
                <a th:href="@{/admin/categories/index}" class="btn btn-danger">⬅ Quay lại</a>
                <button type="submit" class="btn btn-update">💾 Cập nhật</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
