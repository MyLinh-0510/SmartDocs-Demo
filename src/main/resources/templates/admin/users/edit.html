<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }

        .edit-user-form {
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
        }


        .checkbox-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }

        .checkbox-group input {
            width: auto;
            margin-right: 10px;
            transform: scale(1.2);
        }
    </style>
</head>
<body>

<div th:insert="~{fragments/navbar :: navbar}"></div>

<div id="wrapper">
    <div th:insert="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <h2 class="page-title">Chỉnh sửa người dùng</h2>

        <!-- Thông báo lỗi -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert" style="max-width:600px; width:100%;">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Form chỉnh sửa -->
        <form th:action="@{/admin/users/edit/{id}(id=${editingUser.id})}"
              method="post"
              class="edit-user-form"
              th:object="${editingUser}"
              onsubmit="return confirm('Xác nhận cập nhật thông tin người dùng này?')">

            <div class="form-group">
                <label for="name">Họ & Tên</label>
                <input type="text" id="name" name="name" th:field="*{name}" required />
            </div>

            <div class="form-group">
                <label for="email">Số điện thoại</label>
                <input type="text" id="phone" name="phone" th:field="*{phone}" required />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" th:field="*{email}" required />
            </div>

            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" name="isAdmin" th:checked="${editingUser.admin}" />
                    Quyền Admin (có thể truy cập trang quản trị)
                </label>
            </div>

            <div class="back-link mt-3 text-center">
                <a th:href="@{/admin/users/index}" class="btn btn-danger">⬅ Quay lại</a>
                <button type="submit" class="btn btn-update">💾 Cập nhật</button>
            </div>


        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
