<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo tài khoản mới</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        /* Layout chung */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-content h1 {
            text-align: left;
            margin-bottom: 25px;
        }

        .create-user-form {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            margin-top: 20px;
            background: #fff;
            padding: 25px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .checkbox-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .checkbox-group input {
            margin-right: 10px;
        }

        /* Responsive */
        @media (max-width: 720px) {
            form {
                padding: 20px;
            }
        }
    </style>

</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div class="main-content">

        <h1>Tạo tài khoản mới</h1>

        <!-- Thông báo -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Form tạo tài khoản -->
        <form th:action="@{/admin/users/create}" class="create-user-form" method="post">
            <div class="form-group">
                <label for="name">Họ tên:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="text" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required>
                    <span class="toggle-password" data-toggle="password">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu:</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <span class="toggle-password" data-toggle="confirmPassword">👁️</span>
                </div>
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="isAdmin"> Là quản trị viên (Admin)
                </label>
            </div>

            <div class="back-link mt-3 text-center">
                <a th:href="@{/admin/users/index}" class="btn btn-danger">⬅ Quay lại</a>
                <button type="submit" class="btn btn-info">💾 Tạo tài khoản</button>
            </div>

        </form>
    </div>
</div>

<script>
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.addEventListener('click', () => {
            const inputId = icon.getAttribute('data-toggle');
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
                icon.classList.add('active');
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
                icon.classList.remove('active');
            }
        });
    });
</script>

</body>
</html>
