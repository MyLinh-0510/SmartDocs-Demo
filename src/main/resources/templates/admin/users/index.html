<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách người dùng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link th:href="@{/css/dashboard.css}" rel="stylesheet">
    <link th:href="@{/css/table_button.css}" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
        }

        .main-content h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .add {
            margin-bottom: 30px;
        }

    </style>

</head>
<body>

<!-- Navbar -->
<div th:insert="fragments/navbar :: navbar"></div>

<div id="wrapper">

    <!-- Sidebar -->
    <div th:insert="fragments/sidebar :: sidebar"></div>

    <!-- Main content -->
    <div class="main-content">

        <h1>Danh sách người dùng</h1>

        <!-- Nút thêm người dùng -->
        <div class="add">
            <a th:href="@{/admin/users/create}" class="btn btn-add">➕ Thêm người dùng</a>
        </div>

        <!-- Hiển thị lỗi -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Hiển thị thành công -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Bảng danh sách -->
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên khách hàng</th>
                <th>Email</th>
                <th>Admin</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.admin ? 'Yes' : 'No'}"></td>

                <td>
                    <a th:href="@{'/admin/users/edit/' + ${user.id}}"
                       class="btn btn-edit">✏️ Sửa</a>

                    <a th:href="@{'/admin/users/delete/' + ${user.id}}"
                       class="btn btn-danger delete"
                       th:attr="data-username=${user.name}">
                        🗑️ Xóa
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Quay lại -->
        <div class="back-link">
            <a th:href="@{/admin/dashboard}" class="btn btn-danger">⬅ Quay lại trang Dashboard</a>
        </div>

    </div>
</div>

<!-- Xác nhận xóa người dùng -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll(".delete").forEach(btn => {
            btn.addEventListener("click", function(event) {
                const name = this.getAttribute("data-username");
                if (!confirm(`Bạn có chắc chắn muốn xóa người dùng ${name}?`)) {
                    event.preventDefault();
                }
            });
        });
    });
</script>

<script>
    setTimeout(function () {
        document.querySelectorAll('.alert').forEach(function (alert) {
            alert.style.transition = "opacity 0.4s";
            alert.style.opacity = "0";
            setTimeout(() => alert.remove(), 400);
        });
    }, 5000);
</script>


</body>
</html>
